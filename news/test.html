<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление — Метро New</title>
    <link rel="shortcut icon" href="https://kirill12633.github.io/Metro.New.Official/ru/images/metro-icon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.css">
    <script src="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-check-compat.js"></script>
    <style>
        :root {
            --primary: #0066CC; --primary-dark: #0052a3; --secondary: #FFD700;
            --dark: #202124; --light: #ffffff; --gray: #5f6368;
            --gray-light: #f8f9fa; --gray-border: #dadce0;
            --success: #1e8e3e; --warning: #fbbc04; --danger: #d93025;
            --shadow-md: 0 2px 6px rgba(0,0,0,0.15);
            --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }

        /* Навигация */
        .top-nav {
            background: white; border-radius: var(--radius-lg); box-shadow: var(--shadow-md);
            padding: 15px 25px; margin-bottom: 25px; display: flex;
            justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;
        }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 40px; height: 40px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .logo-text { font-size: 1.3rem; font-weight: 700; color: var(--dark); }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 40px; height: 40px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }

        /* Вкладки */
        .tabs {
            display: flex; gap: 5px; background: white; border-radius: var(--radius-lg);
            padding: 10px 20px; margin-bottom: 25px; box-shadow: var(--shadow-md);
        }
        .tab-btn {
            padding: 12px 28px; border: none; background: transparent; border-radius: var(--radius-md);
            font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 8px; color: var(--gray);
        }
        .tab-btn i { font-size: 1.1rem; }
        .tab-btn:hover { background: var(--gray-light); color: var(--primary); }
        .tab-btn.active { background: var(--primary); color: white; }

        /* Панели */
        .admin-panel {
            background: white; border-radius: var(--radius-lg); box-shadow: var(--shadow-md);
            overflow: hidden;
        }
        .panel-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; padding: 25px 30px; display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; gap: 15px;
        }
        .panel-header h1 { font-size: 1.8rem; display: flex; align-items: center; gap: 10px; }
        .panel-body { padding: 30px; }
        
        .btn {
            display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px;
            border: none; border-radius: var(--radius-md); font-weight: 600;
            cursor: pointer; transition: all 0.3s; text-decoration: none; font-size: 1rem;
        }
        .btn-white { background: white; color: var(--primary); }
        .btn-white:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: var(--dark); }
        .btn-sm { padding: 6px 14px; font-size: 0.85rem; }
        
        /* Таблицы */
        .filters {
            display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; align-items: center;
        }
        .search-box { flex: 1; min-width: 250px; position: relative; }
        .search-box input {
            width: 100%; padding: 12px 12px 12px 45px;
            border: 2px solid var(--gray-border); border-radius: 30px; font-size: 1rem;
        }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--gray); }
        .filter-select {
            padding: 10px 20px; border: 2px solid var(--gray-border); border-radius: 30px;
            background: white; cursor: pointer;
        }
        
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th {
            text-align: left; padding: 15px 10px; background: var(--gray-light);
            color: var(--gray); font-weight: 600; border-bottom: 2px solid var(--gray-border);
        }
        .data-table td { padding: 15px 10px; border-bottom: 1px solid var(--gray-border); vertical-align: middle; }
        .data-table tr:hover { background: var(--gray-light); }
        
        .status-badge {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 600;
        }
        .status-pending { background: #fef7e0; color: var(--warning); }
        .status-approved { background: #e6f4ea; color: var(--success); }
        .status-rejected { background: #fce8e6; color: var(--danger); }
        
        .comment-text {
            max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        
        .action-btn {
            width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--gray-border);
            background: white; cursor: pointer; transition: all 0.2s;
            display: inline-flex; align-items: center; justify-content: center;
            margin: 0 2px; text-decoration: none; color: var(--gray);
        }
        .action-btn:hover { transform: translateY(-2px); }
        .action-btn.approve:hover { background: var(--success); color: white; border-color: var(--success); }
        .action-btn.reject:hover { background: var(--danger); color: white; border-color: var(--danger); }
        .action-btn.view:hover { background: var(--primary); color: white; }
        
        /* Форма новостей */
        .form-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; }
        .form-main, .form-sidebar { background: var(--gray-light); border-radius: var(--radius-md); padding: 25px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-control { width: 100%; padding: 12px 15px; border: 2px solid var(--gray-border); border-radius: var(--radius-md); font-family: inherit; font-size: 1rem; }
        .toggle-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .toggle-btn {
            flex: 1; min-width: 100px; padding: 12px; background: white;
            border: 2px solid var(--gray-border); border-radius: var(--radius-md);
            cursor: pointer; text-align: center; transition: all 0.2s;
        }
        .toggle-btn i { display: block; font-size: 1.2rem; margin-bottom: 5px; }
        .toggle-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
        .checkbox-group { display: flex; gap: 20px; flex-wrap: wrap; }
        .action-buttons { display: flex; gap: 15px; margin-top: 30px; justify-content: flex-end; flex-wrap: wrap; }
        
        /* Пагинация */
        .pagination {
            display: flex; justify-content: center; gap: 5px; margin-top: 30px; flex-wrap: wrap;
        }
        .page-btn {
            width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--gray-border);
            background: white; cursor: pointer; transition: all 0.2s;
        }
        .page-btn:hover:not(:disabled) { background: var(--primary); color: white; }
        .page-btn.active { background: var(--primary); color: white; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Модальное окно */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white; border-radius: var(--radius-lg); max-width: 500px;
            width: 90%; padding: 30px; text-align: center;
        }
        .modal-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 25px; }
        
        /* Уведомления */
        .notification {
            position: fixed; top: 20px; right: 20px; padding: 15px 25px;
            background: white; border-radius: var(--radius-md); box-shadow: var(--shadow-md);
            display: none; align-items: center; gap: 10px; z-index: 2000;
            animation: slideIn 0.3s ease;
        }
        .notification.show { display: flex; }
        .notification.success { border-left: 4px solid var(--success); }
        .notification.error { border-left: 4px solid var(--danger); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .loading { text-align: center; padding: 40px; color: var(--gray); }
        hr { border: none; border-top: 1px solid var(--gray-border); margin: 20px 0; }
        
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .tabs { flex-direction: column; }
            .tab-btn { justify-content: center; }
            .data-table { display: block; overflow-x: auto; }
        }
    </style>
</head>
<body>
    <div class="notification" id="notification"><i class="fas" id="notificationIcon"></i><span id="notificationMessage"></span></div>
    
    <div class="modal" id="deleteModal">
        <div class="modal-content">
            <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: var(--danger); margin-bottom: 15px;"></i>
            <h3 id="deleteModalTitle">Удалить?</h3>
            <p id="deleteModalText"></p>
            <div class="modal-buttons">
                <button class="btn btn-sm" onclick="closeDeleteModal()">Отмена</button>
                <button class="btn btn-sm btn-danger" id="confirmDelete">Удалить</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="top-nav">
            <div class="logo">
                <div class="logo-icon">M</div>
                <div class="logo-text">Метро New</div>
            </div>
            <div class="user-info">
                <span id="userName">Загрузка...</span>
                <div class="user-avatar" id="userAvatar">A</div>
            </div>
        </div>

        <!-- Вкладки -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('news')">
                <i class="fas fa-newspaper"></i> Новости
            </button>
            <button class="tab-btn" onclick="switchTab('comments')">
                <i class="fas fa-comments"></i> Комментарии
                <span id="pendingBadge" style="background: var(--danger); color: white; border-radius: 20px; padding: 2px 8px; font-size: 0.7rem;"></span>
            </button>
        </div>

        <!-- Панель новостей -->
        <div id="newsPanel" class="admin-panel">
            <div class="panel-header">
                <h1><i class="fas fa-newspaper"></i> Управление новостями</h1>
                <button class="btn btn-white" onclick="showCreateForm()"><i class="fas fa-plus"></i> Создать новость</button>
            </div>
            <div class="panel-body" id="newsListContainer">
                <div class="loading"><i class="fas fa-spinner fa-spin"></i> Загрузка...</div>
            </div>
            <div id="formContainer" class="panel-body" style="display: none;"></div>
        </div>

        <!-- Панель комментариев -->
        <div id="commentsPanel" class="admin-panel" style="display: none;">
            <div class="panel-header">
                <h1><i class="fas fa-comments"></i> Модерация комментариев</h1>
                <div>
                    <button class="btn btn-white" onclick="loadComments()"><i class="fas fa-sync-alt"></i> Обновить</button>
                </div>
            </div>
            <div class="panel-body" id="commentsContainer">
                <div class="loading"><i class="fas fa-spinner fa-spin"></i> Загрузка комментариев...</div>
            </div>
        </div>
    </div>

    <script>
        // ===== FIREBASE =====
        firebase.initializeApp({
            apiKey: "AIzaSyAVSAXTU1VqF36GJA1pQOfxRxo3_ixW7F4",
            authDomain: "metro-new-admin.firebaseapp.com",
            projectId: "metro-new-admin",
            storageBucket: "metro-new-admin.firebasestorage.app",
            messagingSenderId: "769002010414",
            appId: "1:769002010414:web:bdeb93a7eddc4cab63ecbf"
        });

        try {
            firebase.appCheck().activate('6LfgAZkrAAAAAOOU9svqDc-yVa23p4BRbEfElYJ-', true);
        } catch(e) { console.warn(e); }

        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentUser = null;
        let allNews = [];
        let currentPage = 1;
        const pageSize = 8;
        let deleteId = null;
        let deleteType = null;
        let currentEditId = null;
        let simplemde = null;
        let currentTab = 'news';

        // ===== УВЕДОМЛЕНИЯ =====
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            const icon = document.getElementById('notificationIcon');
            const msg = document.getElementById('notificationMessage');
            icon.className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
            notification.className = `notification show ${type}`;
            msg.textContent = message;
            setTimeout(() => notification.classList.remove('show'), 3000);
        }

        // ===== АВТОРИЗАЦИЯ =====
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('userName').textContent = user.email || 'Администратор';
                document.getElementById('userAvatar').textContent = (user.email || 'A')[0].toUpperCase();
                loadNews();
                loadPendingCount();
            } else {
                window.location.href = 'https://kirill12633.github.io/Metro.New.Official/ru/admin/login';
            }
        });

        // ===== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК =====
        window.switchTab = (tab) => {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (tab === 'news') {
                document.querySelector('.tab-btn:first-child').classList.add('active');
                document.getElementById('newsPanel').style.display = 'block';
                document.getElementById('commentsPanel').style.display = 'none';
                loadNews();
            } else {
                document.querySelector('.tab-btn:last-child').classList.add('active');
                document.getElementById('newsPanel').style.display = 'none';
                document.getElementById('commentsPanel').style.display = 'block';
                loadComments();
            }
        };

        // ===== ЗАГРУЗКА КОЛИЧЕСТВА ОЖИДАЮЩИХ КОММЕНТАРИЕВ =====
        async function loadPendingCount() {
            try {
                const snapshot = await db.collection('comments')
                    .where('status', '==', 'pending')
                    .limit(100)
                    .get();
                const count = snapshot.size;
                const badge = document.getElementById('pendingBadge');
                if (count > 0) {
                    badge.textContent = count;
                    badge.style.display = 'inline-block';
                } else {
                    badge.style.display = 'none';
                }
            } catch(e) { console.warn(e); }
        }

        // ===== ЗАГРУЗКА КОММЕНТАРИЕВ =====
        async function loadComments() {
            const container = document.getElementById('commentsContainer');
            container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Загрузка...</div>';
            
            try {
                const snapshot = await db.collection('comments')
                    .orderBy('createdAt', 'desc')
                    .limit(200)
                    .get();
                
                if (snapshot.empty) {
                    container.innerHTML = '<div style="text-align: center; padding: 40px;"><i class="fas fa-comments" style="font-size: 3rem; color: var(--gray);"></i><p>Нет комментариев</p></div>';
                    return;
                }
                
                let comments = [];
                snapshot.forEach(doc => {
                    comments.push({ id: doc.id, ...doc.data() });
                });
                
                // Загружаем заголовки новостей для отображения
                const newsTitles = {};
                const newsIds = [...new Set(comments.map(c => c.newsId))];
                for (const nid of newsIds) {
                    const newsDoc = await db.collection('news').doc(nid).get();
                    if (newsDoc.exists) {
                        newsTitles[nid] = newsDoc.data().title || 'Без названия';
                    }
                }
                
                const statusNames = { pending: 'На модерации', approved: 'Одобрен', rejected: 'Отклонен' };
                const statusClasses = { pending: 'status-pending', approved: 'status-approved', rejected: 'status-rejected' };
                
                let html = `
                    <div class="filters">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="commentSearch" placeholder="Поиск по тексту..." oninput="filterComments()">
                        </div>
                        <select class="filter-select" id="commentStatusFilter" onchange="filterComments()">
                            <option value="all">Все статусы</option>
                            <option value="pending">На модерации</option>
                            <option value="approved">Одобренные</option>
                            <option value="rejected">Отклоненные</option>
                        </select>
                    </div>
                    <div style="overflow-x: auto;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Новость</th>
                                    <th>Комментарий</th>
                                    <th>Автор</th>
                                    <th>Дата</th>
                                    <th>Статус</th>
                                    <th>Действия</th>
                                </tr>
                            </thead>
                            <tbody id="commentsTableBody">
                `;
                
                comments.forEach(comment => {
                    const date = comment.createdAt?.toDate ? comment.createdAt.toDate().toLocaleString() : 'только что';
                    const newsTitle = newsTitles[comment.newsId] || 'Новость удалена';
                    
                    html += `
                        <tr data-status="${comment.status}" data-text="${(comment.text || '').toLowerCase()}">
                            <td><a href="https://kirill12633.github.io/Metro.New.Official/ru/news?id=${comment.newsId}" target="_blank" style="color: var(--primary);">${newsTitle.substring(0, 40)}</a></td>
                            <td class="comment-text" title="${escapeHtml(comment.text)}">${escapeHtml(comment.text.substring(0, 100))}${comment.text.length > 100 ? '...' : ''}</td>
                            <td><i class="fas fa-user"></i> ${escapeHtml(comment.author || 'Гость')}</td>
                            <td><i class="far fa-clock"></i> ${date}</td>
                            <td><span class="status-badge ${statusClasses[comment.status]}">${statusNames[comment.status]}</span></td>
                            <td>
                                ${comment.status === 'pending' ? `
                                    <button class="action-btn approve" onclick="moderateComment('${comment.id}', 'approved')" title="Одобрить"><i class="fas fa-check"></i></button>
                                    <button class="action-btn reject" onclick="moderateComment('${comment.id}', 'rejected')" title="Отклонить"><i class="fas fa-times"></i></button>
                                ` : ''}
                                <button class="action-btn view" onclick="showCommentDetails('${comment.id}', '${escapeHtml(comment.text).replace(/'/g, "\\'")}', '${escapeHtml(comment.author || 'Гость')}', '${date}')" title="Просмотр"><i class="fas fa-eye"></i></button>
                                <button class="action-btn delete" onclick="showDeleteModal('${comment.id}', 'comment', 'Удалить комментарий?')" title="Удалить"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                });
                
                html += '</tbody></table></div>';
                container.innerHTML = html;
                loadPendingCount();
                
            } catch(e) {
                console.error(e);
                container.innerHTML = '<div class="loading" style="color: var(--danger);">Ошибка загрузки комментариев</div>';
            }
        }
        
        window.filterComments = () => {
            const search = document.getElementById('commentSearch')?.value.toLowerCase() || '';
            const status = document.getElementById('commentStatusFilter')?.value || 'all';
            const rows = document.querySelectorAll('#commentsTableBody tr');
            
            rows.forEach(row => {
                let show = true;
                if (status !== 'all' && row.dataset.status !== status) show = false;
                if (search && !row.dataset.text.includes(search)) show = false;
                row.style.display = show ? '' : 'none';
            });
        };
        
        window.showCommentDetails = (id, text, author, date) => {
            alert(`Автор: ${author}\nДата: ${date}\n\nТекст:\n${text}`);
        };
        
        window.moderateComment = async (commentId, status) => {
            try {
                await db.collection('comments').doc(commentId).update({ status });
                showNotification(status === 'approved' ? 'Комментарий одобрен' : 'Комментарий отклонен');
                loadComments();
            } catch(e) {
                showNotification('Ошибка', 'error');
                console.error(e);
            }
        };

        // ===== НОВОСТИ (как было, но с доработками) =====
        async function loadNews() {
            try {
                const snapshot = await db.collection('news').orderBy('createdAt', 'desc').get();
                allNews = [];
                snapshot.forEach(doc => allNews.push({ id: doc.id, ...doc.data() }));
                displayNewsList();
            } catch(error) {
                console.error(error);
                document.getElementById('newsListContainer').innerHTML = '<div class="loading" style="color: var(--danger);">Ошибка загрузки</div>';
            }
        }

        function displayNewsList() {
            const searchInput = document.getElementById('searchInput');
            const statusFilterEl = document.getElementById('statusFilter');
            const categoryFilterEl = document.getElementById('categoryFilter');
            
            const searchTerm = searchInput?.value.toLowerCase() || '';
            const statusFilter = statusFilterEl?.value || 'all';
            const categoryFilter = categoryFilterEl?.value || 'all';

            let filtered = allNews.filter(news => {
                if (searchTerm && !news.title?.toLowerCase().includes(searchTerm)) return false;
                if (statusFilter !== 'all' && news.status !== statusFilter) return false;
                if (categoryFilter !== 'all' && news.category !== categoryFilter) return false;
                return true;
            });

            const totalPages = Math.ceil(filtered.length / pageSize);
            const start = (currentPage - 1) * pageSize;
            const paginatedNews = filtered.slice(start, start + pageSize);

            const categoryNames = { 'announcement': 'Анонс', 'update': 'Обновление', 'important': 'Важное', 'event': 'Событие' };
            const statusNames = { 'published': 'Опубликовано', 'draft': 'Черновик' };

            let html = `
                <div class="filters">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Поиск..." value="${searchTerm}">
                    </div>
                    <select class="filter-select" id="statusFilter">
                        <option value="all">Все статусы</option>
                        <option value="published" ${statusFilter === 'published' ? 'selected' : ''}>Опубликовано</option>
                        <option value="draft" ${statusFilter === 'draft' ? 'selected' : ''}>Черновик</option>
                    </select>
                    <select class="filter-select" id="categoryFilter">
                        <option value="all">Все категории</option>
                        <option value="announcement" ${categoryFilter === 'announcement' ? 'selected' : ''}>Анонс</option>
                        <option value="update" ${categoryFilter === 'update' ? 'selected' : ''}>Обновление</option>
                        <option value="important" ${categoryFilter === 'important' ? 'selected' : ''}>Важное</option>
                        <option value="event" ${categoryFilter === 'event' ? 'selected' : ''}>Событие</option>
                    </select>
                </div>
                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead><tr><th>Заголовок</th><th>Категория</th><th>Статус</th><th>Дата</th><th>Просмотры</th><th>Действия</th></tr></thead>
                        <tbody>
            `;

            if (paginatedNews.length === 0) {
                html += '<tr><td colspan="6" style="text-align: center; padding: 40px;">Нет новостей</td></tr>';
            } else {
                paginatedNews.forEach(item => {
                    const date = item.createdAt?.toDate ? item.createdAt.toDate().toLocaleDateString('ru-RU') : 'н/д';
                    html += `<tr>
                        <td><div style="font-weight: 600; color: var(--primary);">${escapeHtml(item.title || 'Без названия')}</div>${item.badge ? `<small>🏷️ ${escapeHtml(item.badge)}</small>` : ''}</td>
                        <td><span class="status-badge" style="background: var(--gray-light);">${categoryNames[item.category] || item.category}</span></td>
                        <td><span class="status-badge ${item.status === 'published' ? 'status-approved' : 'status-pending'}">${statusNames[item.status] || item.status}</span></td>
                        <td>${date}</td>
                        <td>${item.views || 0}</td>
                        <td>
                            <div style="display: flex; gap: 5px;">
                                <a href="https://kirill12633.github.io/Metro.New.Official/ru/news?id=${item.id}" target="_blank" class="action-btn view"><i class="fas fa-eye"></i></a>
                                <button class="action-btn edit" onclick="showEditForm('${item.id}')"><i class="fas fa-edit"></i></button>
                                <button class="action-btn delete" onclick="showDeleteModal('${item.id}', 'news', 'Удалить новость "${escapeHtml(item.title).replace(/'/g, "\\'")}"?')"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>`;
                });
            }
            html += '</tbody></table></div>';

            if (totalPages > 1) {
                html += '<div class="pagination">';
                html += `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i></button>`;
                for (let i = 1; i <= totalPages; i++) {
                    if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                        html += `<button class="page-btn ${currentPage === i ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
                    } else if (i === currentPage - 3 || i === currentPage + 3) {
                        html += `<span class="page-btn" style="border: none; background: transparent;">...</span>`;
                    }
                }
                html += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}><i class="fas fa-chevron-right"></i></button>`;
                html += '</div>';
            }

            document.getElementById('newsListContainer').innerHTML = html;
            document.getElementById('searchInput')?.addEventListener('input', () => { currentPage = 1; displayNewsList(); });
            document.getElementById('statusFilter')?.addEventListener('change', () => { currentPage = 1; displayNewsList(); });
            document.getElementById('categoryFilter')?.addEventListener('change', () => { currentPage = 1; displayNewsList(); });
        }

        window.changePage = (page) => { currentPage = page; displayNewsList(); };
        window.showCreateForm = () => loadForm(null);
        window.showEditForm = (id) => loadForm(id);
        
        async function loadForm(id = null) {
            currentEditId = id;
            document.getElementById('newsListContainer').style.display = 'none';
            document.getElementById('formContainer').style.display = 'block';
            document.getElementById('formContainer').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Загрузка...</div>';

            let newsData = { title: '', excerpt: '', content: '', category: 'announcement', badge: '', important: false, status: 'draft', tags: [] };
            if (id) {
                const doc = await db.collection('news').doc(id).get();
                if (doc.exists) newsData = { ...doc.data(), id: doc.id };
            }

            let tagsValue = Array.isArray(newsData.tags) ? newsData.tags.join(', ') : (newsData.tags || '');
            let dateValue = '';
            if (newsData.createdAt?.toDate) {
                const d = newsData.createdAt.toDate();
                d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
                dateValue = d.toISOString().slice(0, 16);
            }

            const formHtml = `
                <h2 style="margin-bottom: 20px; color: var(--primary);"><i class="fas ${id ? 'fa-edit' : 'fa-plus-circle'}"></i> ${id ? 'Редактирование' : 'Создание'}</h2>
                <form id="dynamicNewsForm">
                    <div class="form-grid">
                        <div class="form-main">
                            <div class="form-group"><label>Заголовок *</label><input type="text" id="formTitle" class="form-control" value="${escapeHtml(newsData.title || '')}" required></div>
                            <div class="form-group"><label>Краткое описание *</label><textarea id="formExcerpt" class="form-control" rows="3" required>${escapeHtml(newsData.excerpt || '')}</textarea></div>
                            <div class="form-group"><label>Полный текст *</label><textarea id="formContent" style="display: none;">${escapeHtml(newsData.content || '')}</textarea><div id="markdownEditor"></div></div>
                        </div>
                        <div class="form-sidebar">
                            <div class="form-group">
                                <label>Категория</label>
                                <div class="toggle-group" id="formCategoryGroup">
                                    <div class="toggle-btn ${newsData.category === 'announcement' ? 'active' : ''}" data-category="announcement" onclick="selectCategory('announcement')"><i class="fas fa-bullhorn"></i> Анонс</div>
                                    <div class="toggle-btn ${newsData.category === 'update' ? 'active' : ''}" data-category="update" onclick="selectCategory('update')"><i class="fas fa-sync-alt"></i> Обновление</div>
                                    <div class="toggle-btn ${newsData.category === 'important' ? 'active' : ''}" data-category="important" onclick="selectCategory('important')"><i class="fas fa-exclamation-circle"></i> Важное</div>
                                    <div class="toggle-btn ${newsData.category === 'event' ? 'active' : ''}" data-category="event" onclick="selectCategory('event')"><i class="fas fa-calendar-alt"></i> Событие</div>
                                </div>
                                <input type="hidden" id="formCategory" value="${newsData.category || 'announcement'}">
                            </div>
                            <div class="form-group"><label>Метка (badge)</label><input type="text" id="formBadge" class="form-control" value="${escapeHtml(newsData.badge || '')}" placeholder="🔥 Горячее"></div>
                            <div class="checkbox-group"><label><input type="checkbox" id="formImportant" ${newsData.important ? 'checked' : ''}> <i class="fas fa-star"></i> Важная</label></div>
                            <div class="form-group"><label>Дата</label><input type="datetime-local" id="formDate" class="form-control" value="${dateValue}"></div>
                            <div class="form-group"><label>Теги</label><input type="text" id="formTags" class="form-control" value="${escapeHtml(tagsValue)}" placeholder="метро, обновление"></div>
                            <div class="checkbox-group"><label><input type="checkbox" id="formPublish" ${newsData.status === 'published' ? 'checked' : ''}> <i class="fas fa-globe"></i> Опубликовать</label></div>
                        </div>
                    </div>
                    <hr>
                    <div class="action-buttons">
                        <button type="button" class="btn btn-primary" onclick="cancelForm()">Отмена</button>
                        <button type="submit" class="btn btn-success">Сохранить</button>
                    </div>
                </form>
            `;

            document.getElementById('formContainer').innerHTML = formHtml;
            if (simplemde) simplemde.toTextArea();
            simplemde = new SimpleMDE({ element: document.getElementById('formContent'), spellChecker: false, placeholder: 'Markdown...' });
            if (newsData.content) simplemde.value(newsData.content);
            document.getElementById('dynamicNewsForm').addEventListener('submit', saveNews);
        }

        window.selectCategory = (cat) => {
            document.querySelectorAll('#formCategoryGroup .toggle-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`#formCategoryGroup .toggle-btn[data-category="${cat}"]`).classList.add('active');
            document.getElementById('formCategory').value = cat;
        };

        async function saveNews(e) {
            e.preventDefault();
            const title = document.getElementById('formTitle').value.trim();
            const excerpt = document.getElementById('formExcerpt').value.trim();
            const content = simplemde.value().trim();
            if (!title || !excerpt || !content) { showNotification('Заполните все поля', 'error'); return; }
            
            let tags = document.getElementById('formTags').value.trim().split(',').map(t => t.trim()).filter(t => t);
            const newsData = {
                title, excerpt, content, category: document.getElementById('formCategory').value,
                badge: document.getElementById('formBadge').value.trim() || null,
                important: document.getElementById('formImportant').checked,
                tags, status: document.getElementById('formPublish').checked ? 'published' : 'draft',
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            if (!currentEditId) { newsData.views = 0; newsData.ratings = []; newsData.createdAt = firebase.firestore.FieldValue.serverTimestamp(); }
            
            const dateInput = document.getElementById('formDate').value;
            if (dateInput && !currentEditId) newsData.createdAt = firebase.firestore.Timestamp.fromDate(new Date(dateInput));
            
            try {
                if (currentEditId) await db.collection('news').doc(currentEditId).update(newsData);
                else await db.collection('news').add(newsData);
                showNotification('Сохранено!');
                cancelForm();
                loadNews();
            } catch(e) { showNotification('Ошибка: ' + e.message, 'error'); }
        }

        window.cancelForm = () => {
            document.getElementById('newsListContainer').style.display = 'block';
            document.getElementById('formContainer').style.display = 'none';
            if (simplemde) { simplemde.toTextArea(); simplemde = null; }
            currentEditId = null;
        };

        window.showDeleteModal = (id, type, text) => {
            deleteId = id;
            deleteType = type;
            document.getElementById('deleteModalTitle').textContent = type === 'news' ? 'Удалить новость?' : 'Удалить комментарий?';
            document.getElementById('deleteModalText').textContent = text;
            document.getElementById('deleteModal').classList.add('active');
        };
        
        window.closeDeleteModal = () => { deleteId = null; deleteType = null; document.getElementById('deleteModal').classList.remove('active'); };
        
        document.getElementById('confirmDelete').addEventListener('click', async () => {
            if (!deleteId) return;
            try {
                await db.collection(deleteType === 'news' ? 'news' : 'comments').doc(deleteId).delete();
                showNotification('Удалено');
                closeDeleteModal();
                if (deleteType === 'news') loadNews();
                else loadComments();
            } catch(e) { showNotification('Ошибка', 'error'); }
        });
        
        window.addEventListener('click', (e) => { if (e.target === document.getElementById('deleteModal')) closeDeleteModal(); });
        
        function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
    </script>
</body>
</html>
