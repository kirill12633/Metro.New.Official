    <style>
        /* ========== СТИЛИ МЕТРО NEW ========== */
        :root {
            --primary: #0066CC;
            --primary-dark: #0052a3;
            --primary-light: #4d94ff;
            --dark: #202124;
            --light: #ffffff;
            --gray: #5f6368;
            --gray-light: #f8f9fa;

            --shadow-md: 0 2px 6px rgba(0,0,0,0.15);

            --radius-md: 8px;

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Montserrat', sans-serif;

            background: #f8f9fa;

        }
        
        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }
        
        .card {
            background: var(--light);
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .card-header {
            padding: 24px 24px 16px;
            border-bottom: 1px solid var(--gray-border);
        }
        
        .logo {

        .logo-icon {

        .logo-text {
            font-size: 1.5rem;

        }
        
        .card-header h1 {
            font-size: 1.4rem;
            font-weight: 500;
            color: var(--dark);
        }
        
        .card-header p {
            font-size: 0.9rem;

        .card-body {
            padding: 24px;
        }
        
        .card-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--gray-border);
            text-align: center;
            font-size: 0.75rem;

        }
        
        .navigation {
            display: flex;

            margin-bottom: 20px;
        }
        
        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;

            text-decoration: none;
            font-size: 0.9rem;
            padding: 8px 12px;
            background: var(--light);

        .nav-link:hover {

        }
        
        .profile-row {
            display: flex;

        }
        
        .avatar {

        .profile-info {

        .profile-name {

        .trust-badge {

        .online-dot {

        @keyframes pulse {

        .info-grid {

        .btn {

            align-items: center;
            gap: 8px;

            background: var(--primary);
            color: white;

            border-radius: var(--radius-sm);
            font-size: 0.9rem;

        }
        
        .loading-spinner {
            display: flex;
            justify-content: center;

        }
        
        .spinner {
            width: 40px;
            height: 40px;

        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }

        .error-message {
            background: #ffebee;
            color: var(--danger);
            padding: 16px;
            border-radius: var(--radius-md);
            text-align: center;
        }
        
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        
        .toast {
            background: white;
            border-left: 4px solid var(--primary);
            box-shadow: var(--shadow-lg);
            padding: 12px 20px;
            margin-bottom: 8px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;

            animation: slideIn 0.3s;
        }
        
        .toast.error {
            border-left-color: var(--danger);
        }
        
        .toast.warning {
            border-left-color: var(--warning);
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }

        .footer-links {
            display: flex;

        .footer-links a {

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--gray-border);

        .history-item:last-child {

        @media (max-width: 600px) {

        @media (prefers-color-scheme: dark) {

            .security-icon {
                background: #292a2d;

            .toast {

    </style>
</head>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ========== КОНФИГУРАЦИЯ FIREBASE ==========
        const firebaseConfig = {
            apiKey: "AIzaSyDNAyhui3Lc_IX0wuot7_Z6Vdf9Bw5A9mE",
            authDomain: "metro-new-85226.firebaseapp.com",
            databaseURL: "https://metro-new-85226-default-rtdb.firebaseio.com",
            projectId: "metro-new-85226",
            storageBucket: "metro-new-85226.firebasestorage.app",
            messagingSenderId: "905640751733",
            appId: "1:905640751733:web:f1ab3a1b119ca1e245fe3c"
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        
        // ========== APP CHECK ==========
        const appCheck = firebase.appCheck();
        appCheck.activate('6LfgAZkrAAAAAOOU9svqDc-yVa23p4BRbEfElYJ-', true);
        
        const db = firebase.firestore();
        
        let currentUser = null;

        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        function getUidFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('uid');
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let icon = 'fa-check-circle';
            let color = '#34a853';
            if (type === 'error') {
                icon = 'fa-exclamation-circle';
                color = '#ea4335';
            } else if (type === 'warning') {
                icon = 'fa-exclamation-triangle';
                color = '#fbbc04';
            }
            
            toast.innerHTML = `
                <i class="fas ${icon}" style="color: ${color};"></i>
                <span>${message}</span>
            `;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function copyToClipboard(text) {
            navigator.clipboard?.writeText(text).then(() => {
                showToast('✅ Скопировано!');
            }).catch(() => {
                showToast('❌ Не удалось скопировать', 'error');
            });
        }

        function formatDate(timestamp) {
            if (!timestamp) return '—';
            try {
                const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
                if (isNaN(date.getTime())) return '—';
                return date.toLocaleDateString('ru-RU', {
                    day: '2-digit', month: '2-digit', year: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });
            } catch {
                return '—';
            }
        }

        function getAgeWord(age) {
            if (!age) return '';
            if (age % 10 === 1 && age % 100 !== 11) return 'год';
            if ([2, 3, 4].includes(age % 10) && ![12, 13, 14].includes(age % 100)) return 'года';
            return 'лет';
        }

        function calculateAge(birthDate) {
            if (!birthDate?.year) return null;
            const today = new Date();
            let age = today.getFullYear() - birthDate.year;
            const monthDiff = today.getMonth() + 1 - (birthDate.month || 1);
            const dayDiff = today.getDate() - (birthDate.day || 1);
            if (monthDiff < 0 || (monthDiff === 0 && dayDiff < 0)) age--;
            return age;
        }

        function detectProvider(user) {
            const email = user.email || '';
            if (email.includes('@gmail.com') || email.includes('@googlemail.com')) return 'google';
            if (email && !user.isGuest) return 'email';
            return 'guest';
        }

        function getDisplayName(user) {
            return user.displayName || user.firstName || user.username || 
                   (user.email ? user.email.split('@')[0] : 'Пользователь');
        }

        function getInitials(name) {
            if (!name) return '?';
            return name.charAt(0).toUpperCase();
        }

        function getAccountAge(createdAt) {
            if (!createdAt) return '—';
            try {
                const created = createdAt.toDate ? createdAt.toDate() : new Date(createdAt);
                const now = new Date();
                const diffDays = Math.floor((now - created) / (1000 * 60 * 60 * 24));
                
                if (diffDays < 1) return 'Меньше дня';
                if (diffDays < 30) return `${diffDays} ${getDayWord(diffDays)}`;
                
                const months = Math.floor(diffDays / 30);
                if (months < 12) return `${months} ${getMonthWord(months)}`;
                
                const years = Math.floor(months / 12);
                return `${years} ${getYearWord(years)}`;
            } catch {
                return '—';
            }
        }

        function getDayWord(days) {
            if (days % 10 === 1 && days % 100 !== 11) return 'день';
            if ([2, 3, 4].includes(days % 10) && ![12, 13, 14].includes(days % 100)) return 'дня';
            return 'дней';
        }

        function getMonthWord(months) {
            if (months % 10 === 1 && months % 100 !== 11) return 'месяц';
            if ([2, 3, 4].includes(months % 10) && ![12, 13, 14].includes(months % 100)) return 'месяца';
            return 'месяцев';
        }

        function getYearWord(years) {
            if (years % 10 === 1 && years % 100 !== 11) return 'год';
            if ([2, 3, 4].includes(years % 10) && ![12, 13, 14].includes(years % 100)) return 'года';
            return 'лет';
        }

        // ========== ЗАГРУЗКА ПРОФИЛЯ ==========
        async function loadUserProfile(uid) {
            if (!uid) {
                showError('UID не указан в URL');
                return;
            }
            
            document.getElementById('pageSubtitle').textContent = `Поиск пользователя...`;
            
            try {
                // Пробуем найти по ID документа (быстрее, без индекса)
                const docSnapshot = await db.collection('users_public').doc(uid).get();
                
                if (docSnapshot.exists) {
                    currentUser = { id: docSnapshot.id, ...docSnapshot.data() };
                    renderProfile(currentUser);
                    return;
                }
                
                // Если не нашли по ID, ищем по полю uid
                const snapshot = await db.collection('users_public')
                    .where('uid', '==', uid)
                    .limit(1)
                    .get();
                
                if (snapshot.empty) {
                    showError('Пользователь не найден');
                    return;
                }
                
                const doc = snapshot.docs[0];
                currentUser = { id: doc.id, ...doc.data() };
                renderProfile(currentUser);
                
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                
                if (error.code === 'permission-denied') {
                    showError('Нет прав доступа. Проверьте правила Firestore или App Check.');
                } else if (error.code === 'failed-precondition') {
                    showError('Требуется создать индекс. Перейдите в консоль Firebase → Firestore → Indexes.');
                } else {
                    showError(`Ошибка: ${error.message}`);
                }
            }
        }

        function showError(message) {
            document.getElementById('profileContent').innerHTML = `
                <div class="error-message">
                    <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 16px;"></i>
                    <h3>${message}</h3>
                    <p style="margin-top: 8px; color: var(--gray);">Проверьте правильность UID или вернитесь к списку аккаунтов.</p>
                    <button class="btn" onclick="window.location.href='index.html'" style="margin-top: 20px;">
                        <i class="fas fa-users"></i> Все аккаунты
                    </button>
                </div>
            `;
            document.getElementById('pageSubtitle').textContent = 'Ошибка';
        }

        function renderProfile(user) {
            const displayName = getDisplayName(user);
            const provider = detectProvider(user);
            const age = user.age || calculateAge(user.birthDate);
            const accountAge = getAccountAge(user.createdAt);
            
            document.getElementById('pageTitle').textContent = displayName;
            document.getElementById('pageSubtitle').textContent = `UID: ${user.uid}`;
            
            let trustClass = 'warning';
            let trustText = '⚠️ Требует проверки';
            if (user.emailVerified) {
                trustClass = 'trusted';
                trustText = '✅ Доверенный';
            } else if (provider === 'guest') {
                trustClass = 'guest';
                trustText = '👤 Гость';
            }
            
            const providerIcons = {
                google: 'fab fa-google',
                email: 'fas fa-envelope',
                guest: 'fas fa-user-secret'
            };
            const providerNames = {
                google: 'Google',
                email: 'Email/Password',
                guest: 'Гостевой вход'
            };
            
            const isOnline = user.updatedAt && (new Date() - (user.updatedAt.toDate?.() || new Date(user.updatedAt))) < 5 * 60 * 1000;
            
            let ageText = '—';
            if (age) ageText = `${age} ${getAgeWord(age)}`;
            
            const ipText = user.ipAddress || '—';
            
            const html = `
                <div class="profile-row">
                    <div class="avatar"><span>${getInitials(displayName)}</span></div>
                    <div class="profile-info">
                        <div class="profile-name">
                            <h2>${displayName}</h2>
                            <span class="trust-badge ${trustClass}">${trustText}</span>
                        </div>
                        <div class="online-status">
                            <span class="online-dot ${isOnline ? '' : 'offline'}"></span>
                            <span>${isOnline ? 'Онлайн' : 'Был(а) ' + formatDate(user.updatedAt || user.createdAt)}</span>
                        </div>
                    </div>
                </div>
                
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">UID</div>
                        <div class="info-value">
                            <span style="font-family: monospace; font-size: 0.85rem;">${user.uid ? user.uid.substring(0, 16) + '...' : '—'}</span>
                            <button class="copy-btn" onclick="copyToClipboard('${user.uid}')"><i class="far fa-copy"></i></button>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Email</div>
                        <div class="info-value">
                            <span>${user.email || '—'}</span>
                            <span>${user.emailVerified ? '✅' : '⚠️'}</span>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Возраст</div>
                        <div class="info-value">${ageText}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Username</div>
                        <div class="info-value">${user.username || '—'}</div>
                    </div>
                </div>
            `;
            
            document.getElementById('profileContent').innerHTML = html;
            
            const tabsHtml = `
                <div class="tabs" style="margin-top: 24px;">
                    <button class="tab-button active" data-tab="main"><i class="fas fa-user"></i> Основное</button>
                    <button class="tab-button" data-tab="security"><i class="fas fa-shield-alt"></i> Безопасность</button>
                    <button class="tab-button" data-tab="activity"><i class="fas fa-map-marker-alt"></i> Активность</button>
                </div>
                
                <div class="tab-pane active" id="tab-main">
                    <div class="card" style="margin-top: 0;">
                        <div class="card-body">
                            <div class="info-grid">
                                <div class="info-item">
                                    <div class="info-label">Регистрация</div>
                                    <div class="info-value"><i class="far fa-calendar-alt" style="color: var(--gray);"></i> ${formatDate(user.createdAt)}</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">Последнее обновление</div>
                                    <div class="info-value"><i class="far fa-clock" style="color: var(--gray);"></i> ${formatDate(user.updatedAt)}</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">Провайдер</div>
                                    <div class="info-value"><i class="${providerIcons[provider]}" style="color: var(--primary);"></i> ${providerNames[provider]}</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">Возраст аккаунта</div>
                                    <div class="info-value">${accountAge}</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">IP адрес</div>
                                    <div class="info-value">
                                        <span style="font-family: monospace;">${ipText}</span>
                                        <button class="copy-btn" onclick="copyToClipboard('${ipText}')"><i class="far fa-copy"></i></button>
                                    </div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">Согласие на рассылку</div>
                                    <div class="info-value">${user.marketingConsent ? '✅ Да' : '❌ Нет'}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="tab-pane hidden" id="tab-security">
                    <div class="card" style="margin-top: 0;">
                        <div class="card-body">
                            <div class="security-item">
                                <div class="security-icon"><i class="fas fa-shield-alt"></i></div>
                                <div class="security-content">
                                    <div class="security-title">Статус аккаунта</div>
                                    <div class="security-status">${user.status || 'pending_verification'}</div>
                                </div>
                            </div>
                            <div class="security-item">
                                <div class="security-icon"><i class="fas fa-envelope"></i></div>
                                <div class="security-content">
                                    <div class="security-title">Подтверждение email</div>
                                    <div class="security-status">${user.emailVerified ? '✅ Подтвержден' : '⚠️ Не подтвержден'}</div>
                                </div>
                            </div>
                            <div class="security-item">
                                <div class="security-icon"><i class="fas fa-calendar-alt"></i></div>
                                <div class="security-content">
                                    <div class="security-title">Возраст аккаунта</div>
                                    <div class="security-status">${accountAge}</div>
                                </div>
                            </div>
                            <div class="divider"><span>УРОВЕНЬ ДОВЕРИЯ</span></div>
                            <div style="background: ${user.emailVerified ? '#e8f0fe' : '#fef7e0'}; padding: 15px; border-radius: var(--radius-sm); color: ${user.emailVerified ? 'var(--primary)' : '#b06000'};">
                                <i class="fas fa-info-circle"></i> 
                                ${user.emailVerified ? 'Высокий. Email подтвержден.' : 'Средний. Рекомендуем подтвердить email.'}
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="tab-pane hidden" id="tab-activity">
                    <div class="card" style="margin-top: 0;">
                        <div class="card-body">
                            <div class="info-item">
                                <div class="info-label">IP адрес</div>
                                <div class="info-value">${ipText}</div>
                            </div>
                            <div class="divider"><span>ИСТОРИЯ ДЕЙСТВИЙ</span></div>
                            <div class="history-item">
                                <span>${formatDate(user.createdAt)}</span>
                                <span class="history-date"><i class="fas fa-user-plus" style="color: var(--success);"></i> Регистрация</span>
                            </div>
                            ${user.updatedAt ? `
                            <div class="history-item">
                                <span>${formatDate(user.updatedAt)}</span>
                                <span class="history-date"><i class="fas fa-sync-alt" style="color: var(--primary);"></i> Обновление профиля</span>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('profileContent').innerHTML += tabsHtml;
            initTabs();
        }

        function initTabs() {
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tabName = btn.dataset.tab;
                    document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('.tab-pane').forEach(pane => {
                        if (pane.id === `tab-${tabName}`) {
                            pane.classList.remove('hidden');
                        } else {
                            pane.classList.add('hidden');
                        }
                    });
                });
            });
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('copyrightYear').textContent = `© ${new Date().getFullYear()} Метро New. Все права защищены.`;
            
            const uid = getUidFromUrl();
            
            if (uid) {
                loadUserProfile(uid);
            } else {
                showToast('⚠️ Демо-режим. Укажите ?uid=... в URL', 'warning');
                
                const demoUser = {
                    uid: 'demo_12345',
                    email: 'demo@metro.new',
                    displayName: 'Демо Пользователь',
                    username: 'demo_user',
                    age: 25,
                    status: 'active',
                    emailVerified: true,
                    marketingConsent: true,
                    ipAddress: '192.168.1.1',
                    createdAt: new Date(),
                    updatedAt: new Date()
                };
                
                currentUser = demoUser;
                renderProfile(demoUser);
            }
        });

        window.copyToClipboard = copyToClipboard;
    </script>
</body>
</html>
