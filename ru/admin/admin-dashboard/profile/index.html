<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Метро New — Профиль</title>

    <link rel="shortcut icon" href="https://kirill12633.github.io/Metro.New.Official/ru/images/metro-icon.png">
    <link rel="apple-touch-icon" href="https://kirill12633.github.io/Metro.New.Official/ru/images/metro-icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet для карты -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-check-compat.js"></script>

    <style>
        :root {
            --primary: #0066CC;
            --primary-dark: #0052a3;
            --dark: #202124;
            --light: #ffffff;
            --gray: #5f6368;
            --gray-light: #f8f9fa;
            --gray-border: #dadce0;
            --shadow-md: 0 2px 6px rgba(0,0,0,0.15);
            --shadow-lg: 0 4px 12px rgba(0,0,0,0.15);
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --success: #34a853;
            --warning: #fbbc04;
            --danger: #ea4335;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            background: #f8f9fa;
            color: var(--dark);
            padding: 20px;
        }
        
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Экран входа */
        .login-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        
        .login-screen.hidden { display: none; }
        
        .login-card {
            background: var(--light);
            border-radius: var(--radius-lg);
            padding: 40px;
            max-width: 400px;
            width: 90%;
            box-shadow: var(--shadow-lg);
        }
        
        .login-logo {
            width: 60px; height: 60px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            margin: 0 auto 20px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h2 { font-size: 1.5rem; margin-bottom: 8px; }
        .login-header p { color: var(--gray); }
        
        .form-group { margin-bottom: 16px; }
        
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--gray);
            margin-bottom: 6px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-sm);
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0,102,204,0.2);
        }
        
        .btn {
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }
        
        .btn:hover { background: var(--primary-dark); }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }
        
        .btn-danger {
            background: var(--danger);
        }
        
        .login-error {
            color: var(--danger);
            text-align: center;
            margin-top: 12px;
            font-size: 0.9rem;
        }
        
        /* Основной контент */
        .main-content.hidden { display: none; }
        
        .navigation {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            text-decoration: none;
            padding: 8px 16px;
            background: var(--light);
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
        }
        
        .card {
            background: var(--light);
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .card-header {
            padding: 24px 24px 16px;
            border-bottom: 1px solid var(--gray-border);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        
        .logo-icon {
            width: 40px; height: 40px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .logo-text { font-size: 1.5rem; font-weight: 700; }
        
        .card-body { padding: 24px; }
        
        /* Профиль */
        .profile-header {
            display: flex;
            gap: 24px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        
        .avatar {
            width: 100px; height: 100px;
            background: linear-gradient(135deg, var(--primary) 0%, #4d94ff 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            font-weight: bold;
        }
        
        .profile-info h2 { font-size: 1.8rem; margin-bottom: 4px; }
        .profile-info p { color: var(--gray); }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-top: 8px;
        }
        
        .badge.trusted { background: #e8f5e9; color: #2e7d32; }
        .badge.warning { background: #fff3e0; color: #e65100; }
        .badge.blocked { background: #ffebee; color: #c62828; }
        
        /* Сетка информации */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .info-item {
            background: var(--gray-light);
            border-radius: var(--radius-sm);
            padding: 16px;
        }
        
        .info-label {
            font-size: 0.75rem;
            color: var(--gray);
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        
        .info-value {
            font-size: 1.1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* Вкладки */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            padding: 10px 20px;
            background: var(--light);
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .tab-pane.hidden { display: none; }
        
        /* Управление IP */
        .ip-map {
            height: 300px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            border: 1px solid var(--gray-border);
            z-index: 1;
        }
        
        .ip-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .ip-table th {
            text-align: left;
            padding: 12px;
            background: var(--gray-light);
            font-size: 0.8rem;
            color: var(--gray);
        }
        
        .ip-table td {
            padding: 12px;
            border-bottom: 1px solid var(--gray-border);
        }
        
        .ip-status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
        }
        
        .ip-status.allowed { background: #e8f5e9; color: #2e7d32; }
        .ip-status.blocked { background: #ffebee; color: #c62828; }
        
        /* История действий */
        .history-item {
            display: flex;
            padding: 12px;
            border-bottom: 1px solid var(--gray-border);
        }
        
        .history-icon {
            width: 40px; height: 40px;
            background: var(--gray-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
        }
        
        .history-content { flex: 1; }
        .history-action { font-weight: 500; }
        .history-time { font-size: 0.8rem; color: var(--gray); }
        
        /* Действия */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        
        .action-btn {
            padding: 12px 20px;
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-sm);
            background: var(--light);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 150px;
            justify-content: center;
        }
        
        .action-btn.danger { color: var(--danger); border-color: var(--danger); }
        .action-btn.danger:hover { background: var(--danger); color: white; }
        .action-btn.success { color: var(--success); border-color: var(--success); }
        
        /* Тост */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        
        .toast {
            background: white;
            border-left: 4px solid var(--primary);
            padding: 12px 20px;
            border-radius: 4px;
            box-shadow: var(--shadow-lg);
            margin-bottom: 8px;
            animation: slideIn 0.3s;
        }
        
        .toast.error { border-left-color: var(--danger); }
        .toast.success { border-left-color: var(--success); }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Загрузка */
        .loading-spinner {
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(0,102,204,0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 600px) {
            .profile-header { flex-direction: column; text-align: center; }
            .action-buttons { flex-direction: column; }
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --dark: #e8eaed;
                --light: #202124;
                --gray: #9aa0a6;
                --gray-light: #292a2d;
                --gray-border: #5f6368;
            }
            body { background: #1a1a1a; }
        }
    </style>
</head>
<body>
    <!-- ЭКРАН ВХОДА -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <div class="login-logo">M</div>
            <div class="login-header">
                <h2>Метро New</h2>
                <p>Вход для персонала</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Логин</label>
                    <input type="text" class="form-input" id="loginUsername" placeholder="Введите логин" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" class="form-input" id="loginPassword" placeholder="Введите пароль" required>
                </div>
                <button type="submit" class="btn">Войти</button>
                <div class="login-error" id="loginError"></div>
            </form>
        </div>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div class="main-content hidden" id="mainContent">
        <div class="container">
            <div class="navigation">
                <a href="index.html" class="nav-link">
                    <i class="fas fa-arrow-left"></i> Назад к аккаунтам
                </a>
                <div style="display: flex; gap: 8px;">
                    <span id="adminInfo" style="color: var(--gray);"></span>
                    <a href="#" class="nav-link" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i> Выйти
                    </a>
                </div>
            </div>
            
            <div id="profileContent">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ========== КОНФИГУРАЦИЯ ==========
        const firebaseConfig = {
            apiKey: "AIzaSyDNAyhui3Lc_IX0wuot7_Z6Vdf9Bw5A9mE",
            authDomain: "metro-new-85226.firebaseapp.com",
            projectId: "metro-new-85226",
            storageBucket: "metro-new-85226.firebasestorage.app",
            messagingSenderId: "905640751733",
            appId: "1:905640751733:web:f1ab3a1b119ca1e245fe3c"
        };
        
        const SALT = 'metro_new_secret_salt_2026';
        const DISCORD_WEBHOOK = 'https://discord.com/api/webhooks/1494338825374269441/XmUkgSryxxYYvz_-Inqi9jnjuFb4vST4azDWb7p87Vyxc7vJm6AM3KQgYgXYVa_wMirk';

        firebase.initializeApp(firebaseConfig);
        const appCheck = firebase.appCheck();
        appCheck.activate('6LfgAZkrAAAAAOOU9svqDc-yVa23p4BRbEfElYJ-', true);
        
        const db = firebase.firestore();
        
        let currentAdmin = null;
        let currentUser = null;
        let userIps = [];
        let map = null;
        let markers = [];

        // ========== УТИЛИТЫ ==========
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password + SALT);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                return (await res.json()).ip;
            } catch { return 'unknown'; }
        }

        function formatDate(timestamp) {
            if (!timestamp) return '—';
            try {
                const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
                return date.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            } catch { return '—'; }
        }

        function getUidFromUrl() {
            return new URLSearchParams(window.location.search).get('uid');
        }

        function getInitials(name) {
            return name ? name.charAt(0).toUpperCase() : '?';
        }

        // ========== АВТОРИЗАЦИЯ ==========
        async function login(username, password) {
            try {
                const hashedPassword = await hashPassword(password);
                const snapshot = await db.collection('users')
                    .where('login', '==', username)
                    .where('password', '==', hashedPassword)
                    .limit(1).get();
                
                if (snapshot.empty) throw new Error('Неверный логин или пароль');
                
                currentAdmin = { id: snapshot.docs[0].id, ...snapshot.docs[0].data() };
                
                if (!['admin', 'moderator', 'support'].includes(currentAdmin.role)) {
                    throw new Error('Недостаточно прав');
                }
                
                await db.collection('users').doc(currentAdmin.id).update({
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                    lastIp: await getIP()
                });
                
                localStorage.setItem('metro_admin', JSON.stringify({
                    id: currentAdmin.id, login: currentAdmin.login, role: currentAdmin.role, timestamp: Date.now()
                }));
                
                await logAdminAction('login_profile', currentUser?.uid);
                
                hideLoginScreen();
                loadProfile();
                showToast(`✅ Добро пожаловать, ${currentAdmin.login}!`);
                
            } catch (error) {
                document.getElementById('loginError').textContent = error.message;
            }
        }

        async function logAdminAction(action, targetUid = null) {
            if (!currentAdmin) return;
            await db.collection('admin_history').add({
                adminId: currentAdmin.id,
                adminLogin: currentAdmin.login,
                action,
                targetUid,
                ip: await getIP(),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        function hideLoginScreen() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('adminInfo').textContent = `${currentAdmin.login} (${currentAdmin.role})`;
        }

        async function checkSession() {
            const saved = localStorage.getItem('metro_admin');
            if (!saved) return false;
            try {
                const session = JSON.parse(saved);
                if (Date.now() - session.timestamp > 24 * 60 * 60 * 1000) {
                    localStorage.removeItem('metro_admin');
                    return false;
                }
                const doc = await db.collection('users').doc(session.id).get();
                if (!doc.exists) return false;
                currentAdmin = { id: doc.id, ...doc.data() };
                hideLoginScreen();
                loadProfile();
                return true;
            } catch { return false; }
        }

        function logout() {
            if (currentAdmin) logAdminAction('logout_profile');
            localStorage.removeItem('metro_admin');
            location.reload();
        }

        // ========== ЗАГРУЗКА ПРОФИЛЯ ==========
        async function loadProfile() {
            const uid = getUidFromUrl();
            if (!uid) {
                showError('UID не указан');
                return;
            }
            
            try {
                // Загружаем пользователя
                let userDoc = await db.collection('users_public').doc(uid).get();
                if (!userDoc.exists) {
                    const snapshot = await db.collection('users_public').where('uid', '==', uid).limit(1).get();
                    if (snapshot.empty) { showError('Пользователь не найден'); return; }
                    userDoc = snapshot.docs[0];
                }
                
                currentUser = { id: userDoc.id, ...userDoc.data() };
                
                // Загружаем IP историю
                const ipSnapshot = await db.collection('user_ips')
                    .where('uid', '==', currentUser.uid)
                    .orderBy('timestamp', 'desc')
                    .get();
                
                userIps = ipSnapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                
                // Загружаем историю действий админов с этим пользователем
                const historySnapshot = await db.collection('admin_history')
                    .where('targetUid', '==', currentUser.uid)
                    .orderBy('timestamp', 'desc')
                    .limit(20)
                    .get();
                
                const history = historySnapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                
                renderProfile(history);
                
            } catch (error) {
                console.error('Ошибка:', error);
                showError('Ошибка загрузки профиля');
            }
        }

        function showError(message) {
            document.getElementById('profileContent').innerHTML = `
                <div class="card">
                    <div class="card-body" style="text-align: center; padding: 60px;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: var(--danger); margin-bottom: 20px;"></i>
                        <h3>${message}</h3>
                        <a href="index.html" class="btn" style="margin-top: 20px; display: inline-block; width: auto;">Вернуться к аккаунтам</a>
                    </div>
                </div>
            `;
        }

        function renderProfile(history) {
            const user = currentUser;
            const displayName = user.displayName || user.firstName || user.username || (user.email ? user.email.split('@')[0] : 'Пользователь');
            const provider = user.email?.includes('@gmail.com') ? 'google' : (user.email ? 'email' : 'guest');
            const isBlocked = user.status === 'blocked';
            
            const providerNames = { google: 'Google', email: 'Email', guest: 'Гость' };
            const providerIcons = { google: 'fab fa-google', email: 'fas fa-envelope', guest: 'fas fa-user-secret' };
            
            let trustClass = user.emailVerified ? 'trusted' : 'warning';
            let trustText = user.emailVerified ? '✅ Подтверждён' : '⚠️ Не подтверждён';
            if (isBlocked) { trustClass = 'blocked'; trustText = '🚫 Заблокирован'; }
            
            const html = `
                <div class="card">
                    <div class="card-header">
                        <div class="logo">
                            <div class="logo-icon">M</div>
                            <div class="logo-text">Метро New</div>
                        </div>
                        <div class="profile-header">
                            <div class="avatar">${getInitials(displayName)}</div>
                            <div class="profile-info">
                                <h2>${displayName}</h2>
                                <p><i class="${providerIcons[provider]}"></i> ${providerNames[provider]}</p>
                                <p style="font-size: 0.9rem; margin-top: 4px;">${user.email || '—'}</p>
                                <span class="badge ${trustClass}">${trustText}</span>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="info-grid">
                            <div class="info-item">
                                <div class="info-label">UID</div>
                                <div class="info-value">
                                    <span style="font-family: monospace;">${user.uid?.substring(0, 12)}...</span>
                                    <i class="far fa-copy" onclick="copyToClipboard('${user.uid}')" style="cursor: pointer;"></i>
                                </div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Регистрация</div>
                                <div class="info-value"><i class="far fa-calendar"></i> ${formatDate(user.createdAt)}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Последняя активность</div>
                                <div class="info-value"><i class="far fa-clock"></i> ${formatDate(user.updatedAt || user.createdAt)}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Текущий IP</div>
                                <div class="info-value" style="font-family: monospace;">${user.ipAddress || '—'}</div>
                            </div>
                        </div>
                        
                        <!-- Кнопки действий -->
                        <div class="action-buttons">
                            ${currentAdmin.role !== 'support' ? `
                            <button class="action-btn ${isBlocked ? 'success' : 'danger'}" onclick="toggleBlockUser()">
                                <i class="fas fa-${isBlocked ? 'unlock' : 'ban'}"></i>
                                ${isBlocked ? 'Разблокировать' : 'Заблокировать'}
                            </button>
                            ` : ''}
                            <button class="action-btn" onclick="sendVerificationEmail()">
                                <i class="fas fa-envelope"></i> Отправить подтверждение
                            </button>
                            <button class="action-btn" onclick="resetPassword()">
                                <i class="fas fa-key"></i> Сбросить пароль
                            </button>
                        </div>
                        
                        <!-- Вкладки -->
                        <div class="tabs" style="margin-top: 24px;">
                            <button class="tab-btn active" data-tab="ips">
                                <i class="fas fa-map-marker-alt"></i> IP адреса (${userIps.length})
                            </button>
                            <button class="tab-btn" data-tab="history">
                                <i class="fas fa-history"></i> История действий
                            </button>
                            <button class="tab-btn" data-tab="info">
                                <i class="fas fa-info-circle"></i> Информация
                            </button>
                        </div>
                        
                        <!-- Вкладка IP -->
                        <div class="tab-pane" id="tab-ips">
                            <div id="ipMap" class="ip-map"></div>
                            ${renderIpTable()}
                        </div>
                        
                        <!-- Вкладка История -->
                        <div class="tab-pane hidden" id="tab-history">
                            ${renderHistory(history)}
                        </div>
                        
                        <!-- Вкладка Информация -->
                        <div class="tab-pane hidden" id="tab-info">
                            <div class="info-grid">
                                <div class="info-item">
                                    <div class="info-label">Возраст</div>
                                    <div class="info-value">${user.age || '—'} ${user.age ? getAgeWord(user.age) : ''}</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">Username</div>
                                    <div class="info-value">${user.username || '—'}</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">Согласие на рассылку</div>
                                    <div class="info-value">${user.marketingConsent ? '✅ Да' : '❌ Нет'}</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">Статус</div>
                                    <div class="info-value">${user.status || 'pending_verification'}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('profileContent').innerHTML = html;
            
            // Инициализация карты
            setTimeout(() => initMap(), 100);
            
            // Инициализация вкладок
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
                    document.getElementById(`tab-${btn.dataset.tab}`).classList.remove('hidden');
                    
                    if (btn.dataset.tab === 'ips') setTimeout(() => map?.invalidateSize(), 100);
                });
            });
        }

        function getAgeWord(age) {
            if (age % 10 === 1 && age % 100 !== 11) return 'год';
            if ([2,3,4].includes(age%10) && ![12,13,14].includes(age%100)) return 'года';
            return 'лет';
        }

        function renderIpTable() {
            if (userIps.length === 0) {
                return '<p style="text-align: center; padding: 20px; color: var(--gray);">Нет данных об IP</p>';
            }
            
            return `
                <table class="ip-table">
                    <thead>
                        <tr>
                            <th>IP адрес</th>
                            <th>Локация</th>
                            <th>Последний вход</th>
                            <th>Статус</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        ${userIps.map(ip => `
                            <tr>
                                <td style="font-family: monospace;">${ip.ip}</td>
                                <td>${ip.city || '—'}, ${ip.country || '—'}</td>
                                <td>${formatDate(ip.timestamp)}</td>
                                <td>
                                    <span class="ip-status ${ip.blocked ? 'blocked' : 'allowed'}">
                                        ${ip.blocked ? 'Заблокирован' : 'Разрешён'}
                                    </span>
                                </td>
                                <td>
                                    ${currentAdmin.role !== 'support' ? `
                                    <button onclick="toggleIpBlock('${ip.id}', ${!ip.blocked})" style="background: none; border: none; color: var(--primary); cursor: pointer;">
                                        <i class="fas fa-${ip.blocked ? 'unlock' : 'ban'}"></i>
                                    </button>
                                    ` : ''}
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderHistory(history) {
            if (history.length === 0) {
                return '<p style="text-align: center; padding: 20px; color: var(--gray);">Нет истории действий</p>';
            }
            
            return history.map(h => `
                <div class="history-item">
                    <div class="history-icon">
                        <i class="fas fa-${getActionIcon(h.action)}"></i>
                    </div>
                    <div class="history-content">
                        <div class="history-action">${formatAction(h.action)}</div>
                        <div class="history-time">${h.adminLogin} • ${formatDate(h.timestamp)}</div>
                    </div>
                </div>
            `).join('');
        }

        function getActionIcon(action) {
            const icons = { login: 'sign-in-alt', logout: 'sign-out-alt', block: 'ban', unblock: 'unlock', add_note: 'sticky-note' };
            return icons[action] || 'circle';
        }

        function formatAction(action) {
            const actions = {
                login: 'Вход в админ-панель', logout: 'Выход', block: 'Блокировка', unblock: 'Разблокировка',
                add_note: 'Добавление заметки', reset_password: 'Сброс пароля', send_verification: 'Отправка подтверждения'
            };
            return actions[action] || action;
        }

        // ========== КАРТА ==========
        async function initMap() {
            const mapEl = document.getElementById('ipMap');
            if (!mapEl || userIps.length === 0) return;
            
            if (map) {
                map.remove();
                markers.forEach(m => m.remove());
            }
            
            map = L.map('ipMap').setView([55.7558, 37.6173], 3);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap, © CartoDB'
            }).addTo(map);
            
            markers = [];
            
            for (const ip of userIps) {
                if (!ip.lat || !ip.lon) continue;
                
                const marker = L.marker([ip.lat, ip.lon])
                    .addTo(map)
                    .bindPopup(`
                        <b>${ip.ip}</b><br>
                        ${ip.city || ''}, ${ip.country || ''}<br>
                        ${formatDate(ip.timestamp)}
                    `);
                markers.push(marker);
            }
            
            if (markers.length > 0) {
                const group = new L.featureGroup(markers);
                map.fitBounds(group.getBounds(), { padding: [30, 30] });
            }
        }

        // ========== ДЕЙСТВИЯ ==========
        async function toggleBlockUser() {
            if (!currentUser || currentAdmin.role === 'support') return;
            
            const newStatus = currentUser.status === 'blocked' ? 'active' : 'blocked';
            const action = newStatus === 'blocked' ? 'block' : 'unblock';
            
            if (!confirm(`${newStatus === 'blocked' ? 'Заблокировать' : 'Разблокировать'} пользователя?`)) return;
            
            try {
                await db.collection('users_public').doc(currentUser.id).update({
                    status: newStatus,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                await logAdminAction(action, currentUser.uid);
                showToast(`✅ Пользователь ${newStatus === 'blocked' ? 'заблокирован' : 'разблокирован'}`);
                loadProfile();
            } catch (error) {
                showToast('❌ Ошибка: ' + error.message, 'error');
            }
        }

        async function toggleIpBlock(ipId, block) {
            if (currentAdmin.role === 'support') return;
            
            try {
                await db.collection('user_ips').doc(ipId).update({ blocked: block });
                await logAdminAction(block ? 'block_ip' : 'unblock_ip', currentUser.uid);
                showToast(`✅ IP ${block ? 'заблокирован' : 'разблокирован'}`);
                loadProfile();
            } catch (error) {
                showToast('❌ Ошибка: ' + error.message, 'error');
            }
        }

        async function sendVerificationEmail() {
            try {
                await logAdminAction('send_verification', currentUser.uid);
                showToast('📧 Письмо подтверждения отправлено');
            } catch (error) {
                showToast('❌ Ошибка: ' + error.message, 'error');
            }
        }

        async function resetPassword() {
            if (!confirm('Отправить ссылку для сброса пароля?')) return;
            try {
                await logAdminAction('reset_password', currentUser.uid);
                showToast('🔑 Ссылка для сброса пароля отправлена');
            } catch (error) {
                showToast('❌ Ошибка: ' + error.message, 'error');
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard?.writeText(text).then(() => showToast('✅ Скопировано'));
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        document.addEventListener('DOMContentLoaded', async () => {
            const hasSession = await checkSession();
            if (!hasSession) {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('mainContent').classList.add('hidden');
            }
            
            document.getElementById('loginForm').addEventListener('submit', e => {
                e.preventDefault();
                login(document.getElementById('loginUsername').value, document.getElementById('loginPassword').value);
            });
            
            document.getElementById('logoutBtn').addEventListener('click', e => {
                e.preventDefault();
                logout();
            });
        });

        window.copyToClipboard = copyToClipboard;
        window.toggleBlockUser = toggleBlockUser;
        window.toggleIpBlock = toggleIpBlock;
        window.sendVerificationEmail = sendVerificationEmail;
        window.resetPassword = resetPassword;
    </script>
</body>
</html>
