<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Метро New — Вход</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0066CC 0%, #4d94ff 100%);
            padding: 20px;
        }
        
        .login-box {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-icon {
            width: 60px;
            height: 60px;
            background: #0066CC;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
        }
        
        h2 {
            font-size: 1.5rem;
            color: #202124;
            margin-bottom: 8px;
        }
        
        p {
            color: #5f6368;
            font-size: 0.9rem;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #5f6368;
            margin-bottom: 6px;
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #dadce0;
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        
        input:focus {
            outline: none;
            border-color: #0066CC;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: #0066CC;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        
        button:hover {
            background: #0052a3;
        }
        
        button:disabled {
            background: #9aa0a6;
            cursor: not-allowed;
        }
        
        .error {
            color: #ea4335;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            min-height: 20px;
        }
        
        .success {
            color: #34a853;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
        }
        
        .info {
            margin-top: 20px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 0.8rem;
            color: #5f6368;
            text-align: center;
        }
        
        .info code {
            background: white;
            padding: 2px 6px;
            border-radius: 4px;
        }
        
        .debug {
            margin-top: 15px;
            font-size: 0.75rem;
            color: #5f6368;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <div class="logo-icon">M</div>
            <h2>Метро New</h2>
            <p>Вход для персонала</p>
        </div>
        
        <div class="input-group">
            <label>Логин</label>
            <input type="text" id="username" placeholder="admin" value="admin">
        </div>
        
        <div class="input-group">
            <label>Пароль</label>
            <input type="password" id="password" placeholder="••••••••" value="admin123">
        </div>
        
        <button id="loginBtn" onclick="doLogin()">
            <span id="btnText">Войти</span>
        </button>
        
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
        
        <div class="info">
            <i class="fas fa-info-circle"></i> Тестовый доступ:<br>
            <code>admin / admin123</code>
        </div>
        
        <div class="debug" id="debug"></div>
        
        <div style="margin-top: 15px;">
            <button onclick="createAdmin()" style="background: #5f6368; margin-top: 5px;">
                <i class="fas fa-user-plus"></i> Создать админа
            </button>
            <button onclick="checkFirestore()" style="background: #5f6368; margin-top: 5px;">
                <i class="fas fa-database"></i> Проверить Firestore
            </button>
        </div>
    </div>

    <script>
        // Конфигурация Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDNAyhui3Lc_IX0wuot7_Z6Vdf9Bw5A9mE",
            authDomain: "metro-new-85226.firebaseapp.com",
            projectId: "metro-new-85226",
            storageBucket: "metro-new-85226.firebasestorage.app",
            messagingSenderId: "905640751733",
            appId: "1:905640751733:web:f1ab3a1b119ca1e245fe3c"
        };

        // Инициализация
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // Показать отладку
        const debugEl = document.getElementById('debug');
        debugEl.innerHTML = 'Firebase: ' + firebaseConfig.projectId;

        // Функция входа
        async function doLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const errorEl = document.getElementById('error');
            const successEl = document.getElementById('success');
            
            btn.disabled = true;
            btnText.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Вход...';
            errorEl.textContent = '';
            successEl.textContent = '';
            
            try {
                debugEl.innerHTML = '🔍 Поиск пользователя: ' + username;
                
                // Ищем пользователя
                const snapshot = await db.collection('users')
                    .where('login', '==', username)
                    .limit(1)
                    .get();
                
                debugEl.innerHTML += '<br>📦 Документов найдено: ' + snapshot.size;
                
                if (snapshot.empty) {
                    debugEl.innerHTML += '<br>❌ Пользователь не найден';
                    throw new Error('Пользователь не найден');
                }
                
                const doc = snapshot.docs[0];
                const userData = doc.data();
                
                debugEl.innerHTML += '<br>👤 Логин: ' + userData.login;
                debugEl.innerHTML += '<br>🔑 Роль: ' + userData.role;
                
                // Проверяем пароль
                if (userData.password !== password) {
                    debugEl.innerHTML += '<br>❌ Неверный пароль';
                    throw new Error('Неверный пароль');
                }
                
                debugEl.innerHTML += '<br>✅ Пароль верный!';
                
                // Успех!
                successEl.textContent = '✅ Вход успешен! Перенаправление...';
                
                // Сохраняем сессию
                localStorage.setItem('metro_admin', JSON.stringify({
                    id: doc.id,
                    login: userData.login,
                    role: userData.role,
                    timestamp: Date.now()
                }));
                
                debugEl.innerHTML += '<br>✅ Сессия сохранена';
                
                // Перенаправление
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
                
            } catch (error) {
                console.error('Ошибка:', error);
                errorEl.textContent = '❌ ' + error.message;
                debugEl.innerHTML += '<br>❌ Ошибка: ' + error.message;
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Войти';
            }
        }

        // Создать админа
        async function createAdmin() {
            const btn = event.target;
            btn.disabled = true;
            
            try {
                debugEl.innerHTML = '📝 Создание админа...';
                
                // Проверяем, есть ли уже
                const snapshot = await db.collection('users')
                    .where('login', '==', 'admin')
                    .get();
                
                if (!snapshot.empty) {
                    debugEl.innerHTML += '<br>⚠️ Админ уже существует';
                    alert('Админ уже существует!');
                    return;
                }
                
                // Создаём
                await db.collection('users').add({
                    login: 'admin',
                    password: 'admin123',
                    role: 'admin',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                debugEl.innerHTML += '<br>✅ Админ создан!';
                document.getElementById('success').textContent = '✅ Админ создан! Теперь войдите.';
                
            } catch (error) {
                console.error('Ошибка:', error);
                debugEl.innerHTML += '<br>❌ Ошибка: ' + error.message;
                alert('Ошибка: ' + error.message);
            } finally {
                btn.disabled = false;
            }
        }

        // Проверить Firestore
        async function checkFirestore() {
            const btn = event.target;
            btn.disabled = true;
            debugEl.innerHTML = '🔍 Проверка Firestore...';
            
            try {
                // Проверяем подключение
                const testDoc = await db.collection('_test_').doc('connection').get();
                debugEl.innerHTML += '<br>✅ Подключение к Firestore работает';
                
                // Проверяем коллекцию users
                const usersSnapshot = await db.collection('users').limit(10).get();
                debugEl.innerHTML += '<br>📦 Коллекция users: ' + usersSnapshot.size + ' документов';
                
                if (!usersSnapshot.empty) {
                    usersSnapshot.forEach(doc => {
                        const data = doc.data();
                        debugEl.innerHTML += '<br>  - ' + data.login + ' (' + data.role + ')';
                    });
                }
                
                // Проверяем коллекцию users_public
                const publicSnapshot = await db.collection('users_public').limit(5).get();
                debugEl.innerHTML += '<br>📦 Коллекция users_public: ' + publicSnapshot.size + ' документов';
                
            } catch (error) {
                console.error('Ошибка:', error);
                debugEl.innerHTML += '<br>❌ Ошибка: ' + error.message;
                
                if (error.code === 'permission-denied') {
                    debugEl.innerHTML += '<br>🔒 Нет прав доступа! Проверьте правила Firestore.';
                }
            } finally {
                btn.disabled = false;
            }
        }

        // Enter в полях
        document.getElementById('username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doLogin();
        });
        
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doLogin();
        });

        // Автопроверка при загрузке
        window.addEventListener('load', () => {
            console.log('🚇 Страница загружена');
            
            // Проверяем, есть ли уже сессия
            const saved = localStorage.getItem('metro_admin');
            if (saved) {
                try {
                    const session = JSON.parse(saved);
                    debugEl.innerHTML = '👤 Найдена сессия: ' + session.login;
                } catch (e) {}
            }
        });
    </script>
</body>
</html>
