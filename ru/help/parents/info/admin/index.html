<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Метро New</title>
    
    <!-- Иконки сайта -->
    <link rel="shortcut icon" href="https://kirill12633.github.io/Metro.New.Official/ru/images/metro-icon.png" type="image/png">
    <link rel="apple-touch-icon" href="https://kirill12633.github.io/Metro.New.Official/ru/images/metro-icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://kirill12633.github.io/Metro.New.Official/ru/js/lang-config.js"></script>
    <script src="https://kirill12633.github.io/Metro.New.Official/ru/js/cookies.js"></script>
    <script src="https://kirill12633.github.io/Metro.New.Official/ru/js/update-docs.js"></script>
    <script src="https://kirill12633.github.io/Metro.New.Official/ru/js/error-handler.js"></script>
    <script src="https://kirill12633.github.io/Metro.New.Official/ru/js/soft-limiter.js"></script>
    <script src="https://kirill12633.github.io/Metro.New.Official/ru/js/maintenance.js"></script>
    
    <style>
        :root {
            --primary: #0066CC;
            --dark: #202124;
            --light: #ffffff;
            --gray: #5f6368;
            --gray-light: #f8f9fa;
            --gray-border: #dadce0;
            --danger: #d93025;
            --success: #1e8e3e;
            --warning: #ffc107;
            --radius: 8px;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: #f0f2f5;
            color: var(--dark);
            min-height: 100vh;
        }
        
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .login-card {
            background: var(--light);
            border-radius: var(--radius);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .login-card h2 { margin-bottom: 10px; }
        .login-card p { color: var(--gray); margin-bottom: 25px; font-size: 0.9rem; }
        
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 0.85rem; font-weight: 500; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--gray-border);
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.95rem;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,102,204,0.1);
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-primary { background: var(--primary); color: white; width: 100%; justify-content: center; }
        .btn-primary:hover { background: #0052a3; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--gray-border); }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
        
        .error-message { background: #fce8e6; color: var(--danger); padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 0.85rem; display: none; }
        .success-message { background: #e6f4ea; color: var(--success); padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 0.85rem; display: none; }
        
        .admin-panel { display: none; min-height: 100vh; }
        
        .admin-header {
            background: var(--light);
            border-bottom: 1px solid var(--gray-border);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        .admin-header h2 { font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        .user-info { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        
        .admin-content { padding: 30px; max-width: 1200px; margin: 0 auto; }
        
        /* Вкладки админки */
        .admin-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--gray-border);
            flex-wrap: wrap;
        }
        .admin-tab {
            padding: 10px 20px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--gray);
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }
        .admin-tab:hover { color: var(--primary); }
        .admin-tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
        
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        
        /* Статистика */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--light);
            border: 1px solid var(--gray-border);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }
        .stat-card .stat-label {
            font-size: 0.85rem;
            color: var(--gray);
            margin-top: 5px;
        }
        .stat-card .stat-icon {
            font-size: 2rem;
            margin-bottom: 10px;
            opacity: 0.3;
        }
        
        .chart-container {
            background: var(--light);
            border: 1px solid var(--gray-border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
        }
        .chart-title {
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }
        
        .bar-chart { display: flex; flex-direction: column; gap: 10px; }
        
        .bar-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .bar-label {
            width: 120px;
            font-size: 0.8rem;
            text-align: right;
            flex-shrink: 0;
        }
        .bar-track {
            flex: 1;
            height: 24px;
            background: var(--gray-light);
            border-radius: 12px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 12px;
            transition: width 1s ease;
            display: flex;
            align-items: center;
            padding-left: 10px;
            font-size: 0.75rem;
            color: white;
            font-weight: 600;
            min-width: 30px;
        }
        .bar-fill.articles { background: #0066CC; }
        .bar-fill.news { background: #f5a623; }
        .bar-fill.videos { background: #d93025; }
        .bar-fill.legal { background: #7b1fa2; }
        .bar-fill.document { background: #1e8e3e; }
        
        .top-list { display: flex; flex-direction: column; gap: 8px; }
        
        .top-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: var(--gray-light);
            border-radius: var(--radius);
        }
        .top-rank {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .top-rank.gold { background: #ffc107; color: #000; }
        .top-rank.silver { background: #9e9e9e; }
        .top-rank.bronze { background: #cd7f32; }
        .top-info { flex: 1; }
        .top-title { font-weight: 500; font-size: 0.85rem; }
        .top-meta { font-size: 0.7rem; color: var(--gray); }
        .top-views { font-weight: 600; font-size: 0.9rem; color: var(--primary); }
        
        /* Таблица */
        .items-table {
            width: 100%;
            background: var(--light);
            border-radius: var(--radius);
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .table-header {
            display: grid;
            grid-template-columns: 3fr 1fr 1fr 80px 120px;
            padding: 15px 20px;
            background: var(--gray-light);
            font-weight: 600;
            font-size: 0.85rem;
            gap: 10px;
        }
        .table-row {
            display: grid;
            grid-template-columns: 3fr 1fr 1fr 80px 120px;
            padding: 12px 20px;
            border-bottom: 1px solid var(--gray-light);
            align-items: center;
            font-size: 0.9rem;
            gap: 10px;
        }
        .table-row:hover { background: #fafafa; }
        
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .badge-articles { background: #e3f2fd; color: #0066CC; }
        .badge-news { background: #fff8e1; color: #f5a623; }
        .badge-videos { background: #ffebee; color: #d93025; }
        .badge-legal { background: #f3e5f5; color: #7b1fa2; }
        .badge-document { background: #e8f5e9; color: #2e7d32; }
        
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        
        .modal {
            background: var(--light);
            border-radius: var(--radius);
            width: 100%;
            max-width: 750px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 30px;
        }
        .modal h3 { margin-bottom: 20px; }
        
        @media (max-width: 768px) {
            .table-header, .table-row { grid-template-columns: 1fr; }
            .admin-content { padding: 15px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .bar-label { width: 80px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <h2><i class="fas fa-lock"></i> Вход для администратора</h2>
            <p>Доступ только для авторизованных</p>
            <div class="error-message" id="loginError"></div>
            <div class="form-group"><label>Email</label><input type="email" id="loginEmail"></div>
            <div class="form-group"><label>Пароль</label><input type="password" id="loginPassword"></div>
            <button class="btn btn-primary" onclick="login()"><i class="fas fa-sign-in-alt"></i> Войти</button>
        </div>
    </div>
    
    <div class="admin-panel" id="adminPanel">
        <div class="admin-header">
            <h2><i class="fas fa-cog"></i> Админ-панель | Метро New</h2>
            <div class="user-info">
                <span id="adminEmail"></span>
                <a href="../index.html" class="btn btn-outline btn-sm"><i class="fas fa-eye"></i> Сайт</a>
                <button class="btn btn-danger btn-sm" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Выйти</button>
            </div>
        </div>
        
        <div class="admin-content">
            <div id="statusMessage" class="success-message"></div>
            
            <!-- Вкладки -->
            <div class="admin-tabs">
                <button class="admin-tab active" onclick="switchAdminTab('materials')"><i class="fas fa-list"></i> Материалы</button>
                <button class="admin-tab" onclick="switchAdminTab('stats')"><i class="fas fa-chart-bar"></i> Статистика</button>
            </div>
            
            <!-- Материалы -->
            <div class="admin-section active" id="section-materials">
                <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;">
                    <button class="btn btn-primary" onclick="openAddModal()"><i class="fas fa-plus"></i> Добавить</button>
                    <select id="categoryFilter" onchange="loadItems()" style="padding:8px 12px;border:1px solid var(--gray-border);border-radius:4px;font-family:inherit;">
                        <option value="">Все категории</option>
                        <option value="articles">Статьи</option>
                        <option value="news">Новости</option>
                        <option value="videos">Видео</option>
                        <option value="legal">Юридическое</option>
                        <option value="document">Документы</option>
                    </select>
                    <span style="color:var(--gray);" id="totalCount">Всего: 0</span>
                </div>
                
                <div class="items-table">
                    <div class="table-header">
                        <span>Название</span><span>Категория</span><span>Дата</span><span>Просм.</span><span>Действия</span>
                    </div>
                    <div id="itemsList"><div style="padding:40px;text-align:center;color:var(--gray);">Загрузка...</div></div>
                </div>
            </div>
            
            <!-- Статистика -->
            <div class="admin-section" id="section-stats">
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-newspaper"></i></div><div class="stat-value" id="statTotal">0</div><div class="stat-label">Всего материалов</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-eye"></i></div><div class="stat-value" id="statViews">0</div><div class="stat-label">Всего просмотров</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-star"></i></div><div class="stat-value" id="statImportant">0</div><div class="stat-label">Важных</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-fire"></i></div><div class="stat-value" id="statPopular">—</div><div class="stat-label">Самый популярный</div></div>
                </div>
                
                <div class="chart-container">
                    <div class="chart-title"><i class="fas fa-chart-pie"></i> Распределение по категориям</div>
                    <div class="bar-chart" id="categoryChart"></div>
                </div>
                
                <div class="chart-container">
                    <div class="chart-title"><i class="fas fa-trophy"></i> Топ-10 по просмотрам</div>
                    <div class="top-list" id="topList"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3 id="modalTitle">Добавить материал</h3>
            <div class="form-group"><label>Категория *</label><select id="modalCategory" onchange="onCategoryChange()">
                <option value="articles">📄 Статьи</option><option value="news">📢 Новости</option>
                <option value="videos">🎬 Видео</option><option value="legal">⚖️ Юридическое</option>
                <option value="document">📋 Документ (Google Docs)</option>
            </select></div>
            <div class="form-group"><label>Заголовок *</label><input type="text" id="modalTitleInput"></div>
            <div class="form-group"><label>Описание</label><input type="text" id="modalDescription"></div>
            
            <div id="contentEditor">
                <div class="form-group"><label>Содержание (HTML)</label><textarea id="modalContent" rows="8"></textarea></div>
            </div>
            
            <div id="documentUrlEditor" style="display:none;">
                <div class="form-group"><label>URL Google Docs</label><input type="url" id="modalDocumentUrl" placeholder="https://docs.google.com/document/d/e/.../pub?embedded=true"></div>
                <div class="form-group"><label>Высота iframe (px)</label><input type="number" id="modalIframeHeight" value="600"></div>
            </div>
            
            <div id="videoIdEditor" style="display:none;">
                <div class="form-group"><label>YouTube Video ID</label><input type="text" id="modalVideoId" placeholder="dQw4w9WgXcQ"></div>
            </div>
            
            <div class="form-group"><label>Теги (через запятую)</label><input type="text" id="modalTags"></div>
            <div class="form-group"><label>Возрастной рейтинг</label><select id="modalAgeRating">
                <option value="">Без ограничений</option><option value="6">6+</option><option value="12">12+</option><option value="16">16+</option><option value="18">18+</option>
            </select></div>
            <div class="form-group"><label><input type="checkbox" id="modalImportant"> <b>Важный материал</b></label></div>
            <input type="hidden" id="modalEditId">
            
            <div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;">
                <button class="btn btn-primary" onclick="saveItem()"><i class="fas fa-save"></i> Сохранить</button>
                <button class="btn btn-outline" onclick="closeModal()">Отмена</button>
                <button class="btn btn-danger" id="modalDeleteBtn" style="display:none;margin-left:auto;" onclick="deleteItem()"><i class="fas fa-trash"></i> Удалить</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAVSAXTU1VqF36GJA1pQOfxRxo3_ixW7F4",
            authDomain: "metro-new-admin.firebaseapp.com",
            projectId: "metro-new-admin",
            storageBucket: "metro-new-admin.firebasestorage.app",
            messagingSenderId: "769002010414",
            appId: "1:769002010414:web:bdeb93a7eddc4cab63ecbf"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let allItemsCache = [];
        
        function showStatus(msg, type='success') {
            const el = document.getElementById('statusMessage');
            el.textContent = msg;
            el.className = type==='error'?'error-message':'success-message';
            el.style.display = 'block';
            setTimeout(()=>el.style.display='none', 3000);
        }
        
        window.switchAdminTab = function(tab) {
            document.querySelectorAll('.admin-tab').forEach(b=>b.classList.remove('active'));
            document.querySelector(`.admin-tab:contains('${tab==='materials'?'Материалы':'Статистика'}')`)?.classList.add('active');
            document.querySelectorAll('.admin-section').forEach(s=>s.classList.remove('active'));
            document.getElementById(`section-${tab}`).classList.add('active');
            if(tab==='stats') loadStats();
        };
        
        // Простой селектор по тексту
        document.querySelectorAll('.admin-tab').forEach(tab=>{
            tab.addEventListener('click', function(){
                const t = this.textContent.includes('Материалы')?'materials':'stats';
                switchAdminTab(t);
            });
        });
        
        onAuthStateChanged(auth, async (user) => {
            if(user) {
                try {
                    const adminsSnap = await getDocs(query(collection(db, 'admins'), where('email','==',user.email)));
                    if(!adminsSnap.empty) { showAdminPanel(user); }
                    else { await signOut(auth); showLoginError('Нет прав'); }
                } catch(e) { showLoginError('Ошибка: '+e.message); }
            } else { showLoginScreen(); }
        });
        
        function showLoginScreen() { document.getElementById('loginScreen').style.display='flex'; document.getElementById('adminPanel').style.display='none'; }
        function showAdminPanel(user) {
            document.getElementById('loginScreen').style.display='none';
            document.getElementById('adminPanel').style.display='block';
            document.getElementById('adminEmail').textContent = '👤 '+user.email;
            loadItems();
        }
        function showLoginError(m) { document.getElementById('loginError').textContent=m; document.getElementById('loginError').style.display='block'; }
        
        window.login = async function() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value;
            if(!email||!pass){showLoginError('Заполните все поля');return;}
            try { await signInWithEmailAndPassword(auth, email, pass); }
            catch(e) { showLoginError('Неверный email или пароль'); }
        };
        document.getElementById('loginPassword').addEventListener('keypress',e=>{if(e.key==='Enter')login();});
        window.logout = async ()=>await signOut(auth);
        
        async function loadItems() {
            const container = document.getElementById('itemsList');
            const filter = document.getElementById('categoryFilter')?.value||'';
            container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--gray);">Загрузка...</div>';
            try {
                let q = filter
                    ? query(collection(db, 'parents_info'), where('category','==',filter), orderBy('createdAt','desc'))
                    : query(collection(db, 'parents_info'), orderBy('createdAt','desc'));
                const snapshot = await getDocs(q);
                allItemsCache = [];
                snapshot.forEach(doc=>allItemsCache.push({id:doc.id,...doc.data()}));
                document.getElementById('totalCount').textContent = `Всего: ${snapshot.size}`;
                
                if(snapshot.empty) {
                    container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--gray);">Нет материалов</div>';
                    return;
                }
                
                let html = '';
                snapshot.forEach(docSnap=>{
                    const data = docSnap.data();
                    const date = data.createdAt?.toDate?.().toLocaleDateString('ru-RU')||'—';
                    const cat = data.category||'articles';
                    html += `
                        <div class="table-row">
                            <span style="font-weight:500;">${data.title||'Без названия'}${data.important?' <span class="badge" style="background:#fff3cd;color:#856404;">Важно</span>':''}</span>
                            <span><span class="badge badge-${cat}">${cat}</span></span>
                            <span>${date}</span>
                            <span>${data.views||0}</span>
                            <span style="display:flex;gap:5px;">
                                <button class="btn btn-outline btn-sm" onclick="editItem('${docSnap.id}')"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-danger btn-sm" onclick="deleteItemDirect('${docSnap.id}')"><i class="fas fa-trash"></i></button>
                            </span>
                        </div>`;
                });
                container.innerHTML = html;
            } catch(e) { container.innerHTML = `<div style="padding:40px;text-align:center;color:var(--danger);">Ошибка: ${e.message}</div>`; }
        }
        
        function loadStats() {
            const items = allItemsCache;
            
            // Общая статистика
            document.getElementById('statTotal').textContent = items.length;
            const totalViews = items.reduce((s,i)=>s+(i.views||0),0);
            document.getElementById('statViews').textContent = totalViews;
            document.getElementById('statImportant').textContent = items.filter(i=>i.important).length;
            
            const sorted = [...items].sort((a,b)=>(b.views||0)-(a.views||0));
            document.getElementById('statPopular').textContent = sorted[0]?.title?.slice(0,20)+'...' || '—';
            
            // График категорий
            const cats = {};
            items.forEach(i=>{ cats[i.category] = (cats[i.category]||0)+1; });
            const maxCat = Math.max(...Object.values(cats), 1);
            
            const catNames = { articles:'Статьи', news:'Новости', videos:'Видео', legal:'Юридическое', document:'Документы' };
            const catColors = { articles:'articles', news:'news', videos:'videos', legal:'legal', document:'document' };
            
            let chartHtml = '';
            Object.entries(cats).forEach(([cat,count])=>{
                const pct = Math.round((count/maxCat)*100);
                chartHtml += `
                    <div class="bar-row">
                        <div class="bar-label">${catNames[cat]||cat}</div>
                        <div class="bar-track"><div class="bar-fill ${catColors[cat]||''}" style="width:${pct}%">${count}</div></div>
                    </div>`;
            });
            document.getElementById('categoryChart').innerHTML = chartHtml;
            
            // Топ-10
            let topHtml = '';
            sorted.slice(0,10).forEach((item,i)=>{
                const ranks = ['gold','silver','bronze'];
                const rankClass = i<3?ranks[i]:'';
                topHtml += `
                    <div class="top-item">
                        <div class="top-rank ${rankClass}">${i+1}</div>
                        <div class="top-info">
                            <div class="top-title">${item.title||'Без названия'}</div>
                            <div class="top-meta">${catNames[item.category]||item.category}</div>
                        </div>
                        <div class="top-views"><i class="fas fa-eye"></i> ${item.views||0}</div>
                    </div>`;
            });
            document.getElementById('topList').innerHTML = topHtml || '<p style="color:var(--gray);">Нет данных</p>';
        }
        
        window.deleteItemDirect = async function(id) {
            if(!confirm('Удалить?'))return;
            await deleteDoc(doc(db,'parents_info',id));
            showStatus('Удалено'); loadItems();
        };
        
        window.onCategoryChange = function() {
            const cat = document.getElementById('modalCategory').value;
            document.getElementById('contentEditor').style.display = cat==='document'?'none':'block';
            document.getElementById('documentUrlEditor').style.display = cat==='document'?'block':'none';
            document.getElementById('videoIdEditor').style.display = cat==='videos'?'block':'none';
        };
        
        window.openAddModal = function() {
            document.getElementById('modalTitle').textContent = 'Добавить материал';
            document.getElementById('modalCategory').value = 'articles';
            document.getElementById('modalTitleInput').value = '';
            document.getElementById('modalDescription').value = '';
            document.getElementById('modalContent').value = '';
            document.getElementById('modalVideoId').value = '';
            document.getElementById('modalDocumentUrl').value = '';
            document.getElementById('modalIframeHeight').value = '600';
            document.getElementById('modalTags').value = '';
            document.getElementById('modalAgeRating').value = '';
            document.getElementById('modalImportant').checked = false;
            document.getElementById('modalEditId').value = '';
            document.getElementById('modalDeleteBtn').style.display = 'none';
            onCategoryChange();
            document.getElementById('modalOverlay').classList.add('active');
        };
        
        window.editItem = async function(id) {
            const docSnap = await getDoc(doc(db,'parents_info',id));
            if(!docSnap.exists())return;
            const data = docSnap.data();
            document.getElementById('modalTitle').textContent = 'Редактировать';
            document.getElementById('modalCategory').value = data.category||'articles';
            document.getElementById('modalTitleInput').value = data.title||'';
            document.getElementById('modalDescription').value = data.description||'';
            document.getElementById('modalContent').value = data.content||'';
            document.getElementById('modalVideoId').value = data.videoId||'';
            document.getElementById('modalDocumentUrl').value = data.documentUrl||'';
            document.getElementById('modalIframeHeight').value = data.iframeHeight||600;
            document.getElementById('modalTags').value = (data.tags||[]).join(', ');
            document.getElementById('modalAgeRating').value = data.ageRating||'';
            document.getElementById('modalImportant').checked = data.important||false;
            document.getElementById('modalEditId').value = id;
            document.getElementById('modalDeleteBtn').style.display = 'block';
            onCategoryChange();
            document.getElementById('modalOverlay').classList.add('active');
        };
        
        window.closeModal = () => document.getElementById('modalOverlay').classList.remove('active');
        
        window.saveItem = async function() {
            const title = document.getElementById('modalTitleInput').value.trim();
            const category = document.getElementById('modalCategory').value;
            if(!title){alert('Введите заголовок!');return;}
            
            const data = {
                category, title,
                description: document.getElementById('modalDescription').value.trim(),
                tags: document.getElementById('modalTags').value.split(',').map(t=>t.trim()).filter(Boolean),
                ageRating: document.getElementById('modalAgeRating').value||null,
                important: document.getElementById('modalImportant').checked,
                updatedAt: serverTimestamp()
            };
            
            if(category==='document'){
                data.documentUrl = document.getElementById('modalDocumentUrl').value.trim();
                data.iframeHeight = parseInt(document.getElementById('modalIframeHeight').value)||600;
                data.content = '';
            } else {
                data.content = document.getElementById('modalContent').value.trim();
            }
            if(category==='videos') data.videoId = document.getElementById('modalVideoId').value.trim();
            
            const editId = document.getElementById('modalEditId').value;
            try {
                if(editId) { await updateDoc(doc(db,'parents_info',editId), data); showStatus('✅ Обновлено!'); }
                else { data.createdAt = serverTimestamp(); data.views = 0; data.ratings = []; await addDoc(collection(db,'parents_info'), data); showStatus('✅ Создано!'); }
                closeModal(); loadItems();
            } catch(e) { alert('Ошибка: '+e.message); }
        };
        
        window.deleteItem = async function() {
            const id = document.getElementById('modalEditId').value;
            if(!id||!confirm('Удалить?'))return;
            await deleteDoc(doc(db,'parents_info',id));
            showStatus('🗑️ Удалено'); closeModal(); loadItems();
        };
        
        document.getElementById('modalOverlay').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
    </script>
</body>
</html>
