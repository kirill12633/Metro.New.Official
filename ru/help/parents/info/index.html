<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Метро New — Информация для родителей</title>
    
    <link rel="shortcut icon" href="https://kirill12633.github.io/Metro.New.Official/ru/images/metro-icon.png" type="image/png">
    <link rel="apple-touch-icon" href="https://kirill12633.github.io/Metro.New.Official/ru/images/metro-icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0066CC;
            --primary-dark: #0052a3;
            --dark: #202124;
            --light: #ffffff;
            --gray: #5f6368;
            --gray-light: #f8f9fa;
            --gray-border: #dadce0;
            --shadow-md: 0 2px 6px rgba(0,0,0,0.15);
            --radius-sm: 4px;
            --radius-md: 8px;
            --success: #1e8e3e;
            --warning: #ffc107;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: #f8f9fa;
            color: var(--dark);
            padding: 0;
        }
        
        /* Прогресс-бар чтения */
        .reading-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: var(--primary);
            z-index: 9999;
            transition: width 0.1s ease;
            width: 0%;
        }
        
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        /* Поиск */
        .search-container {
            margin-bottom: 15px;
            position: relative;
        }
        
        .search-input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 0.95rem;
            background: var(--light);
            color: var(--dark);
            transition: all 0.2s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,102,204,0.1);
        }
        
        .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
        }
        
        .search-clear {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--gray);
            display: none;
        }
        
        .search-clear.visible { display: block; }
        
        /* Фильтры */
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-select {
            padding: 8px 12px;
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.85rem;
            background: var(--light);
            color: var(--dark);
            cursor: pointer;
        }
        
        .filter-chip {
            padding: 8px 16px;
            border: 1px solid var(--gray-border);
            border-radius: 20px;
            background: var(--light);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .filter-chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .filter-chip:hover { border-color: var(--primary); }
        
        .results-count {
            font-size: 0.85rem;
            color: var(--gray);
            margin-left: auto;
        }
        
        /* Навигация */
        .navigation {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 8px 12px;
            background: var(--light);
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-sm);
        }
        
        .nav-link:hover { background: var(--gray-light); }
        
        /* Карточка */
        .card {
            background: var(--light);
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }
        
        .card-header {
            padding: 24px 24px 16px;
            text-align: center;
            border-bottom: 1px solid var(--gray-border);
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 16px;
            text-decoration: none;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        .logo-text { font-size: 1.5rem; font-weight: 700; color: var(--dark); }
        
        .card-header h1 { font-size: 1.4rem; font-weight: 500; margin-bottom: 8px; }
        .card-header p { font-size: 0.9rem; color: var(--gray); }
        .card-body { padding: 24px; }
        
        /* Табы */
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--gray-border);
            overflow-x: auto;
        }
        
        .tab-btn {
            padding: 12px 20px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--gray);
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .tab-btn:hover { color: var(--primary); }
        
        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            font-weight: 600;
        }
        
        .tab-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        
        .tab-icon.articles { background: rgba(0,102,204,0.1); color: var(--primary); }
        .tab-icon.news { background: rgba(255,193,7,0.1); color: #f5a623; }
        .tab-icon.videos { background: rgba(255,0,0,0.1); color: #ff0000; }
        .tab-icon.legal { background: rgba(108,117,125,0.1); color: #6c757d; }
        .tab-icon.favorites { background: rgba(255,87,34,0.1); color: #ff5722; }
        .tab-icon.history { background: rgba(156,39,176,0.1); color: #9c27b0; }
        
        /* Список */
        .items-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .item-card {
            padding: 18px;
            background: var(--light);
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.3s forwards;
        }
        
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
        
        .item-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .item-card.important {
            border-left: 4px solid var(--warning);
            background: #fff9e6;
        }
        
        .item-card h3 {
            font-size: 1.1rem;
            margin-bottom: 6px;
            padding-right: 60px;
        }
        
        .item-card p { color: var(--gray); font-size: 0.9rem; margin-bottom: 8px; }
        
        .item-meta {
            display: flex;
            gap: 15px;
            color: var(--gray);
            font-size: 0.8rem;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .item-tags {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        
        .item-tag {
            padding: 3px 8px;
            background: var(--gray-light);
            border-radius: 12px;
            font-size: 0.7rem;
            color: var(--gray);
        }
        
        .important-badge {
            position: absolute;
            top: 18px;
            right: 18px;
            background: var(--warning);
            color: #000;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .bookmark-btn {
            position: absolute;
            top: 18px;
            right: 18px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--gray);
            font-size: 1.2rem;
            transition: all 0.2s;
            z-index: 2;
        }
        
        .bookmark-btn:hover { transform: scale(1.2); }
        .bookmark-btn.active { color: #ff5722; }
        
        .reading-time {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--gray-light);
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: var(--gray);
        }
        
        /* Скелетон */
        .skeleton {
            background: linear-gradient(90deg, 
                var(--gray-light) 25%, 
                var(--gray-border) 50%, 
                var(--gray-light) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-sm);
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .skeleton-card {
            padding: 18px;
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-sm);
            margin-bottom: 12px;
        }
        
        .skeleton-title {
            height: 20px;
            width: 70%;
            margin-bottom: 10px;
        }
        
        .skeleton-text {
            height: 14px;
            width: 90%;
            margin-bottom: 8px;
        }
        
        .skeleton-meta {
            height: 12px;
            width: 40%;
        }
        
        /* Детальный просмотр */
        .detail-view { display: none; }
        .detail-view.active { display: block; }
        .list-view.active { display: block; }
        .list-view { display: none; }
        
        .back-btn { margin-bottom: 20px; }
        
        .item-content {
            line-height: 1.8;
            padding: 20px 0;
        }
        
        .item-content h2 {
            margin: 25px 0 15px;
            font-size: 1.3rem;
            scroll-margin-top: 20px;
        }
        
        .item-content h3 {
            margin: 20px 0 10px;
            scroll-margin-top: 20px;
        }
        
        .meta-info {
            display: flex;
            gap: 20px;
            padding: 15px;
            background: var(--gray-light);
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            color: var(--gray);
            font-size: 0.85rem;
            flex-wrap: wrap;
        }
        
        .video-embed {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            margin: 20px 0;
        }
        
        .video-embed iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: var(--radius-sm);
        }
        
        /* Оглавление */
        .table-of-contents {
            position: sticky;
            top: 20px;
            background: var(--light);
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .toc-title {
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 1rem;
        }
        
        .toc-list {
            list-style: none;
        }
        
        .toc-item {
            padding: 8px 0;
            border-bottom: 1px solid var(--gray-light);
        }
        
        .toc-link {
            color: var(--gray);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
            cursor: pointer;
        }
        
        .toc-link:hover, .toc-link.active { color: var(--primary); }
        .toc-link.h2 { padding-left: 0; font-weight: 500; }
        .toc-link.h3 { padding-left: 15px; font-size: 0.8rem; }
        
        /* Рейтинг */
        .rating-section {
            margin: 30px 0;
            padding: 20px;
            background: var(--gray-light);
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-sm);
            text-align: center;
        }
        
        .rating-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 15px 0;
        }
        
        .rating-btn {
            padding: 12px 30px;
            border: 1px solid var(--gray-border);
            border-radius: 30px;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            font-family: inherit;
            font-size: 0.9rem;
        }
        
        .rating-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .rating-btn.like:hover:not(:disabled) { background: #1e8e3e; color: white; border-color: #1e8e3e; }
        .rating-btn.dislike:hover:not(:disabled) { background: #d93025; color: white; border-color: #d93025; }
        
        /* Шеринг и печать */
        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        .share-section {
            margin: 30px 0;
            padding: 20px;
            background: var(--gray-light);
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-sm);
            text-align: center;
        }
        
        .share-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .share-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.2rem;
        }
        
        .share-btn:hover { transform: translateY(-3px) scale(1.1); }
        .share-btn.telegram { background: #0088cc; }
        .share-btn.whatsapp { background: #25D366; }
        .share-btn.vk { background: #4a76a8; }
        .share-btn.copy { background: var(--gray); }
        
        .copy-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 9999;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translate(-50%, 100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        
        /* Связанные материалы */
        .related-section {
            margin: 30px 0;
            padding: 20px;
            background: var(--gray-light);
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-sm);
        }
        
        .related-title {
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .related-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .related-item {
            padding: 12px;
            background: var(--light);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .related-item:hover { border-color: var(--primary); transform: translateX(5px); }
        
        /* Кнопки */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }
        
        .btn-outline:hover { background: var(--primary); color: white; }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray);
        }
        
        .card-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--gray-border);
            text-align: center;
            font-size: 0.75rem;
            color: var(--gray);
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        
        .footer-links a { color: var(--gray); text-decoration: none; }
        .footer-links a:hover { color: var(--primary); }
        
        /* Печать */
        @media print {
            .navigation, .tabs, .search-container, .filters, 
            .rating-section, .share-section, .action-buttons,
            .card-footer, .back-btn, .bookmark-btn, .reading-progress,
            .related-section, .table-of-contents { display: none !important; }
            
            body { background: white; padding: 0; }
            .container { max-width: 100%; padding: 0; }
            .card { border: none; box-shadow: none; }
            .item-content { font-size: 12pt; line-height: 1.6; }
        }
        
        @media (max-width: 600px) {
            .tabs { gap: 0; }
            .tab-btn { padding: 12px 10px; font-size: 0.75rem; }
            .rating-buttons { flex-direction: column; align-items: center; }
            .share-buttons { gap: 5px; }
            .share-btn { width: 40px; height: 40px; }
            .filters { flex-direction: column; }
            .filter-select { width: 100%; }
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --dark: #e8eaed;
                --light: #202124;
                --gray: #9aa0a6;
                --gray-light: #292a2d;
                --gray-border: #5f6368;
            }
            body { background: #1a1a1a; }
            .item-card.important { background: #332e1a; border-left-color: var(--warning); }
            .rating-btn { background: #292a2d; color: var(--dark); }
            .search-input { background: #292a2d; }
        }
    </style>
</head>
<body>
    <!-- Прогресс-бар чтения -->
    <div class="reading-progress" id="readingProgress"></div>
    
    <div class="container">
        <div class="navigation">
            <a href="https://kirill12633.github.io/Metro.New.Official/ru/help/parents/" class="nav-link">
                <i class="fas fa-arrow-left"></i> Назад к родителям
            </a>
            <div style="display:flex;gap:10px;">
                <a href="admin/" class="nav-link">
                    <i class="fas fa-lock"></i> Админ
                </a>
                <a href="https://kirill12633.github.io/support.metro.new/" class="nav-link">
                    <i class="fas fa-headset"></i> Поддержка
                </a>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <a href="/" class="logo">
                    <div class="logo-icon">M</div>
                    <div class="logo-text">Метро New</div>
                </a>
                <h1 id="mainTitle">Информация для родителей</h1>
                <p id="mainSubtitle">Выберите категорию и материал</p>
            </div>
            
            <div class="card-body">
                <!-- Поиск -->
                <div class="search-container">
                    <input type="search" class="search-input" id="searchInput" placeholder="Поиск по всем материалам...">
                    <i class="fas fa-times search-clear" id="searchClear" onclick="clearSearch()"></i>
                    <i class="fas fa-search search-icon"></i>
                </div>
                
                <!-- Фильтры -->
                <div class="filters">
                    <select class="filter-select" id="sortSelect" onchange="applyFilters()">
                        <option value="newest">Сначала новые</option>
                        <option value="oldest">Сначала старые</option>
                        <option value="popular">По популярности</option>
                        <option value="rated">По рейтингу</option>
                    </select>
                    <button class="filter-chip" id="importantFilter" onclick="toggleImportantFilter()">
                        <i class="fas fa-star"></i> Только важные
                    </button>
                    <span class="results-count" id="resultsCount"></span>
                </div>
                
                <!-- Табы -->
                <div class="tabs" id="tabsContainer">
                    <button class="tab-btn active" data-category="articles">
                        <span class="tab-icon articles"><i class="fas fa-newspaper"></i></span>
                        Статьи
                    </button>
                    <button class="tab-btn" data-category="news">
                        <span class="tab-icon news"><i class="fas fa-bullhorn"></i></span>
                        Новости
                    </button>
                    <button class="tab-btn" data-category="videos">
                        <span class="tab-icon videos"><i class="fab fa-youtube"></i></span>
                        Видео
                    </button>
                    <button class="tab-btn" data-category="legal">
                        <span class="tab-icon legal"><i class="fas fa-gavel"></i></span>
                        Юридическое
                    </button>
                    <button class="tab-btn" data-category="favorites">
                        <span class="tab-icon favorites"><i class="fas fa-bookmark"></i></span>
                        Избранное
                    </button>
                    <button class="tab-btn" data-category="history">
                        <span class="tab-icon history"><i class="fas fa-history"></i></span>
                        Недавние
                    </button>
                </div>
                
                <!-- Список -->
                <div id="listView" class="list-view active">
                    <div id="itemsContainer"></div>
                </div>
                
                <!-- Детальный просмотр -->
                <div id="detailView" class="detail-view">
                    <button class="btn btn-outline back-btn" onclick="goBack()">
                        <i class="fas fa-arrow-left"></i> Назад к списку
                    </button>
                    <div id="detailContent"></div>
                </div>
            </div>
            
            <div class="card-footer">
                <div id="copyrightYear"></div>
                <div class="footer-links">
                    <a href="https://kirill12633.github.io/Metro.New.Official/ru/help/privacy-policy/">Конфиденциальность</a>
                    <a href="https://kirill12633.github.io/Metro.New.Official/ru/help/terms-of-service/">Условия</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, getDocs, doc, getDoc, 
            updateDoc, increment, query, orderBy, arrayUnion 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAVSAXTU1VqF36GJA1pQOfxRxo3_ixW7F4",
            authDomain: "metro-new-admin.firebaseapp.com",
            projectId: "metro-new-admin",
            storageBucket: "metro-new-admin.firebasestorage.app",
            messagingSenderId: "769002010414",
            appId: "1:769002010414:web:bdeb93a7eddc4cab63ecbf"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        document.getElementById('copyrightYear').textContent = `© ${new Date().getFullYear()} Метро New. Все права защищены.`;
        
        let currentCategory = 'articles';
        let currentItemId = null;
        let allData = {}; // Кеш всех данных
        let showOnlyImportant = false;
        let sortBy = 'newest';
        let searchQuery = '';
        
        // Инициализация
        loadAllData();
        
        // Поиск
        document.getElementById('searchInput').addEventListener('input', debounce(function(e) {
            searchQuery = e.target.value.toLowerCase();
            document.getElementById('searchClear').classList.toggle('visible', searchQuery.length > 0);
            loadList();
        }, 300));
        
        window.clearSearch = function() {
            document.getElementById('searchInput').value = '';
            searchQuery = '';
            document.getElementById('searchClear').classList.remove('visible');
            loadList();
        };
        
        // Табы
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                currentItemId = null;
                showList();
            });
        });
        
        // Фильтры
        window.toggleImportantFilter = function() {
            showOnlyImportant = !showOnlyImportant;
            document.getElementById('importantFilter').classList.toggle('active', showOnlyImportant);
            loadList();
        };
        
        window.applyFilters = function() {
            sortBy = document.getElementById('sortSelect').value;
            loadList();
        };
        
        function showList() {
            document.getElementById('listView').classList.add('active');
            document.getElementById('detailView').classList.remove('active');
            document.getElementById('mainTitle').textContent = 'Информация для родителей';
            document.getElementById('mainSubtitle').textContent = 'Выберите категорию и материал';
            document.getElementById('readingProgress').style.width = '0%';
            loadList();
        }
        
        function showDetail() {
            document.getElementById('listView').classList.remove('active');
            document.getElementById('detailView').classList.add('active');
            window.scrollTo(0, 0);
        }
        
        // Загрузка всех данных
        async function loadAllData() {
            const categories = ['articles', 'news', 'videos', 'legal'];
            for (const cat of categories) {
                try {
                    const q = query(collection(db, 'parents_info'), orderBy('category'), orderBy('createdAt', 'desc'));
                    const snapshot = await getDocs(q);
                    allData[cat] = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        if (data.category === cat) {
                            allData[cat].push({ id: doc.id, ...data });
                        }
                    });
                } catch (e) {
                    allData[cat] = [];
                }
            }
            loadList();
        }
        
        function getFilteredItems() {
            let items = [];
            
            if (currentCategory === 'favorites') {
                const favIds = JSON.parse(localStorage.getItem('favorites') || '[]');
                Object.values(allData).forEach(catItems => {
                    catItems.forEach(item => {
                        if (favIds.includes(item.id)) items.push({ ...item, _category: item.category });
                    });
                });
            } else if (currentCategory === 'history') {
                const historyItems = JSON.parse(localStorage.getItem('viewHistory') || '[]');
                Object.values(allData).forEach(catItems => {
                    catItems.forEach(item => {
                        const historyEntry = historyItems.find(h => h.id === item.id);
                        if (historyEntry) items.push({ ...item, _category: item.category, _viewedAt: historyEntry.viewedAt });
                    });
                });
                items.sort((a, b) => new Date(b._viewedAt) - new Date(a._viewedAt));
                return items.slice(0, 20);
            } else {
                items = [...(allData[currentCategory] || [])];
                items.forEach(item => item._category = currentCategory);
            }
            
            // Поиск
            if (searchQuery) {
                items = items.filter(item => 
                    (item.title || '').toLowerCase().includes(searchQuery) ||
                    (item.description || '').toLowerCase().includes(searchQuery) ||
                    (item.content || '').toLowerCase().includes(searchQuery) ||
                    (item.tags || []).some(tag => tag.toLowerCase().includes(searchQuery))
                );
            }
            
            // Фильтр "Только важные"
            if (showOnlyImportant) {
                items = items.filter(item => item.important);
            }
            
            // Сортировка
            switch(sortBy) {
                case 'oldest':
                    items.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
                    break;
                case 'popular':
                    items.sort((a, b) => (b.views || 0) - (a.views || 0));
                    break;
                case 'rated':
                    items.sort((a, b) => (b.ratings?.length || 0) - (a.ratings?.length || 0));
                    break;
                default: // newest
                    items.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
            }
            
            return items;
        }
        
        // Загрузка списка
        function loadList() {
            const container = document.getElementById('itemsContainer');
            const items = getFilteredItems();
            
            document.getElementById('resultsCount').textContent = `Найдено: ${items.length}`;
            
            if (items.length === 0) {
                const emptyMessages = {
                    favorites: 'Нет избранных материалов',
                    history: 'Нет истории просмотров',
                };
                container.innerHTML = `
                    <div class="empty-state" style="text-align:center;padding:40px;color:var(--gray);">
                        <i class="fas fa-${currentCategory === 'favorites' ? 'bookmark' : currentCategory === 'history' ? 'history' : 'search'}" style="font-size:3rem;opacity:0.3;margin-bottom:15px;"></i>
                        <p>${emptyMessages[currentCategory] || 'Ничего не найдено'}</p>
                    </div>`;
                return;
            }
            
            let html = '<div class="items-list">';
            items.forEach((data, index) => {
                const date = data.createdAt?.toDate ? 
                    data.createdAt.toDate().toLocaleDateString('ru-RU') : '';
                
                const importantClass = data.important ? 'important' : '';
                const importantBadge = data.important ? '<span class="important-badge">Важно</span>' : '';
                const isBookmarked = isFavorite(data.id);
                const category = data._category || currentCategory;
                
                // Время чтения
                const wordCount = (data.content || '').split(/\s+/).length;
                const readTime = Math.max(1, Math.ceil(wordCount / 200));
                
                // Видео превью
                let videoThumb = '';
                if (category === 'videos' && data.videoId) {
                    videoThumb = `
                        <div style="position: relative;">
                            <img class="video-thumb" src="https://img.youtube.com/vi/${data.videoId}/mqdefault.jpg" alt="${data.title}" style="width:100%;height:180px;object-fit:cover;border-radius:4px;margin-bottom:10px;">
                            <div class="video-badge" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:50px;height:50px;background:rgba(255,0,0,0.8);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:1.5rem;"><i class="fas fa-play"></i></div>
                        </div>`;
                }
                
                // Теги
                let tagsHtml = '';
                if (data.tags && data.tags.length > 0) {
                    tagsHtml = '<div class="item-tags">' + 
                        data.tags.map(tag => `<span class="item-tag">${tag}</span>`).join('') + 
                        '</div>';
                }
                
                html += `
                    <div class="item-card ${importantClass}" style="animation-delay:${index * 0.05}s" onclick="openItem('${data.id}', '${category}')">
                        <button class="bookmark-btn ${isBookmarked ? 'active' : ''}" onclick="event.stopPropagation();toggleFavorite('${data.id}')">
                            <i class="fas fa-bookmark"></i>
                        </button>
                        ${videoThumb}
                        ${importantBadge}
                        <h3>${highlightText(data.title)}</h3>
                        <p>${highlightText(data.description || '')}</p>
                        <div class="item-meta">
                            ${date ? `<span><i class="far fa-calendar-alt"></i> ${date}</span>` : ''}
                            <span><i class="far fa-eye"></i> ${data.views || 0}</span>
                            ${data.ratings ? `<span><i class="fas fa-star" style="color:#ffc107;"></i> ${data.ratings.length}</span>` : ''}
                            <span class="reading-time"><i class="far fa-clock"></i> ~${readTime} мин</span>
                        </div>
                        ${tagsHtml}
                    </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }
        
        function highlightText(text) {
            if (!searchQuery || !text) return text;
            const regex = new RegExp(`(${searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(regex, '<mark style="background:#fff3cd;padding:0 2px;">$1</mark>');
        }
        
        // Избранное
        function getFavorites() {
            return JSON.parse(localStorage.getItem('favorites') || '[]');
        }
        
        function isFavorite(id) {
            return getFavorites().includes(id);
        }
        
        window.toggleFavorite = function(id) {
            let favs = getFavorites();
            if (favs.includes(id)) {
                favs = favs.filter(f => f !== id);
            } else {
                favs.push(id);
            }
            localStorage.setItem('favorites', JSON.stringify(favs));
            loadList();
        };
        
        // История просмотров
        function addToHistory(id, title, category) {
            let history = JSON.parse(localStorage.getItem('viewHistory') || '[]');
            history = history.filter(h => h.id !== id);
            history.unshift({ id, title, category, viewedAt: new Date().toISOString() });
            history = history.slice(0, 20);
            localStorage.setItem('viewHistory', JSON.stringify(history));
        }
        
        // Открыть элемент
        window.openItem = async function(id, category) {
            currentItemId = id;
            const cat = category || currentCategory;
            currentCategory = cat;
            
            // Обновляем активный таб
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('active');
                if (b.dataset.category === cat) b.classList.add('active');
            });
            
            showDetail();
            
            const container = document.getElementById('detailContent');
            container.innerHTML = `
                <div class="skeleton-card"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-meta"></div></div>`;
            
            try {
                const docRef = doc(db, 'parents_info', id);
                const docSnap = await getDoc(docRef);
                
                if (!docSnap.exists()) {
                    container.innerHTML = '<p style="text-align:center;">Материал не найден</p>';
                    return;
                }
                
                const data = docSnap.data();
                addToHistory(id, data.title, cat);
                
                // Увеличиваем просмотры
                await updateDoc(docRef, { views: increment(1) });
                
                const date = data.createdAt?.toDate ? 
                    data.createdAt.toDate().toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' }) : '';
                
                const wordCount = (data.content || '').split(/\s+/).length;
                const readTime = Math.max(1, Math.ceil(wordCount / 200));
                
                // Рейтинг
                let ratingText = 'Нет оценок';
                if (data.ratings && data.ratings.length > 0) {
                    const likes = data.ratings.filter(r => r.value === 1).length;
                    const total = data.ratings.length;
                    const percent = Math.round((likes / total) * 100);
                    ratingText = `👍 ${likes} (${percent}%) из ${total}`;
                }
                
                const voted = localStorage.getItem(`rated_${id}`);
                const isBookmarked = isFavorite(id);
                
                // Видео
                let videoEmbed = '';
                if (cat === 'videos' && data.videoId) {
                    videoEmbed = `
                        <div class="video-embed">
                            <iframe src="https://www.youtube.com/embed/${data.videoId}" frameborder="0" allowfullscreen></iframe>
                        </div>`;
                }
                
                // Оглавление
                const toc = generateTOC(data.content || '');
                
                document.getElementById('mainTitle').textContent = data.title;
                document.getElementById('mainSubtitle').textContent = data.description || '';
                
                container.innerHTML = `
                    <div class="meta-info">
                        ${date ? `<span><i class="far fa-calendar-alt"></i> ${date}</span>` : ''}
                        <span><i class="far fa-eye"></i> ${(data.views || 0) + 1} просмотров</span>
                        <span class="reading-time"><i class="far fa-clock"></i> ~${readTime} мин чтения</span>
                        ${data.ageRating ? `<span><i class="fas fa-child"></i> ${data.ageRating}+</span>` : ''}
                        ${data.important ? '<span><i class="fas fa-star" style="color:#ffc107;"></i> Важное</span>' : ''}
                    </div>
                    
                    ${toc ? `
                    <div class="table-of-contents">
                        <div class="toc-title"><i class="fas fa-list"></i> Содержание</div>
                        <ul class="toc-list">${toc}</ul>
                    </div>` : ''}
                    
                    <div class="action-buttons">
                        <button class="btn btn-outline" onclick="toggleFavorite('${id}')">
                            <i class="fas fa-bookmark"></i> ${isBookmarked ? 'В избранном' : 'В избранное'}
                        </button>
                        <button class="btn btn-outline" onclick="window.print()">
                            <i class="fas fa-print"></i> Печать
                        </button>
                    </div>
                    
                    ${videoEmbed}
                    
                    <div class="item-content" id="articleContent">${data.content || 'Описание отсутствует'}</div>
                    
                    ${data.tags && data.tags.length > 0 ? `
                    <div style="margin:20px 0;">
                        ${data.tags.map(tag => `<span class="item-tag" style="cursor:pointer;margin:3px;" onclick="searchByTag('${tag}')">${tag}</span>`).join('')}
                    </div>` : ''}
                    
                    <div class="rating-section">
                        <p style="margin-bottom:10px;font-weight:500;">Был ли материал полезным?</p>
                        <div class="rating-buttons">
                            <button class="rating-btn like" onclick="rateItem(1)" ${voted ? 'disabled' : ''}>
                                <i class="fas fa-thumbs-up"></i> Да
                            </button>
                            <button class="rating-btn dislike" onclick="rateItem(0)" ${voted ? 'disabled' : ''}>
                                <i class="fas fa-thumbs-down"></i> Нет
                            </button>
                        </div>
                        <p style="color:var(--gray);"><i class="fas fa-star" style="color:#ffc107;"></i> ${ratingText}</p>
                    </div>
                    
                    <div class="share-section">
                        <p style="font-weight:500;">Поделиться</p>
                        <div class="share-buttons">
                            <button class="share-btn telegram" onclick="shareItem('telegram')"><i class="fab fa-telegram-plane"></i></button>
                            <button class="share-btn whatsapp" onclick="shareItem('whatsapp')"><i class="fab fa-whatsapp"></i></button>
                            <button class="share-btn vk" onclick="shareItem('vk')"><i class="fab fa-vk"></i></button>
                            <button class="share-btn copy" onclick="shareItem('copy')"><i class="fas fa-link"></i></button>
                        </div>
                    </div>
                    
                    <div class="related-section" id="relatedSection">
                        <div class="related-title">Похожие материалы</div>
                        <div class="related-list" id="relatedList">Загрузка...</div>
                    </div>
                `;
                
                // Связанные материалы
                loadRelated(data.tags || [], id);
                
                // Скролл прогресс
                setupReadingProgress();
                
            } catch (error) {
                console.error('Ошибка:', error);
                container.innerHTML = '<p style="text-align:center;color:#d93025;">Ошибка загрузки</p>';
            }
        };
        
        // Оглавление
        function generateTOC(content) {
            const div = document.createElement('div');
            div.innerHTML = content;
            const headings = div.querySelectorAll('h2, h3');
            if (headings.length < 2) return '';
            
            let html = '';
            headings.forEach((h, i) => {
                const id = `heading-${i}`;
                h.id = id;
                html += `<li class="toc-item"><a class="toc-link ${h.tagName.toLowerCase()}" onclick="document.getElementById('${id}').scrollIntoView({behavior:'smooth'})">${h.textContent}</a></li>`;
            });
            return html;
        }
        
        // Связанные материалы
        async function loadRelated(tags, currentId) {
            const container = document.getElementById('relatedList');
            if (!tags || tags.length === 0) {
                container.innerHTML = '<p style="color:var(--gray);">Нет похожих материалов</p>';
                return;
            }
            
            let related = [];
            Object.values(allData).forEach(catItems => {
                catItems.forEach(item => {
                    if (item.id !== currentId && item.tags) {
                        const commonTags = item.tags.filter(t => tags.includes(t));
                        if (commonTags.length > 0) {
                            related.push({ ...item, _relevance: commonTags.length });
                        }
                    }
                });
            });
            
            related.sort((a, b) => b._relevance - a._relevance);
            related = related.slice(0, 5);
            
            if (related.length === 0) {
                container.innerHTML = '<p style="color:var(--gray);">Нет похожих материалов</p>';
                return;
            }
            
            container.innerHTML = related.map(item => `
                <div class="related-item" onclick="openItem('${item.id}', '${item.category}')">
                    <strong>${item.title}</strong>
                    <p style="font-size:0.8rem;color:var(--gray);">${item.description || ''}</p>
                </div>
            `).join('');
        }
        
        // Поиск по тегу
        window.searchByTag = function(tag) {
            document.getElementById('searchInput').value = tag;
            searchQuery = tag;
            document.getElementById('searchClear').classList.add('visible');
            showList();
        };
        
        // Прогресс чтения
        function setupReadingProgress() {
            const progressBar = document.getElementById('readingProgress');
            window.addEventListener('scroll', () => {
                const scrollTop = window.scrollY;
                const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
                progressBar.style.width = Math.min(progress, 100) + '%';
            });
        }
        
        // Рейтинг
        window.rateItem = async function(value) {
            if (!currentItemId) return;
            if (localStorage.getItem(`rated_${currentItemId}`)) {
                alert('Вы уже оценили этот материал');
                return;
            }
            try {
                const docRef = doc(db, 'parents_info', currentItemId);
                await updateDoc(docRef, {
                    ratings: arrayUnion({ value, date: new Date().toISOString() })
                });
                localStorage.setItem(`rated_${currentItemId}`, 'true');
                alert('Спасибо за оценку!');
                openItem(currentItemId, currentCategory);
            } catch (error) {
                alert('Ошибка при сохранении оценки');
            }
        };
        
        // Шеринг
        window.shareItem = function(platform) {
            const url = window.location.href.split('?')[0] + '?category=' + currentCategory + '&id=' + currentItemId;
            const title = document.getElementById('mainTitle').textContent;
            
            let shareUrl = '';
            switch(platform) {
                case 'telegram': shareUrl = `https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(title)}`; break;
                case 'whatsapp': shareUrl = `https://wa.me/?text=${encodeURIComponent(title + ' ' + url)}`; break;
                case 'vk': shareUrl = `https://vk.com/share.php?url=${encodeURIComponent(url)}&title=${encodeURIComponent(title)}`; break;
                case 'copy':
                    navigator.clipboard.writeText(url).then(() => {
                        const msg = document.createElement('div');
                        msg.className = 'copy-message';
                        msg.textContent = '✅ Ссылка скопирована!';
                        document.body.appendChild(msg);
                        setTimeout(() => msg.remove(), 2000);
                    });
                    return;
            }
            if (shareUrl) window.open(shareUrl, '_blank', 'width=600,height=400');
        };
        
        window.goBack = function() {
            currentItemId = null;
            showList();
        };
        
        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }
        
        // URL параметры
        const urlParams = new URLSearchParams(window.location.search);
        const urlCategory = urlParams.get('category');
        const urlId = urlParams.get('id');
        
        if (urlCategory && ['articles', 'news', 'videos', 'legal'].includes(urlCategory)) {
            currentCategory = urlCategory;
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('active');
                if (b.dataset.category === urlCategory) b.classList.add('active');
            });
        }
        
        if (urlId) {
            openItem(urlId, urlCategory || 'articles');
        }
    </script>
</body>
</html>
